  <script>
    if (typeof history !== 'undefined' && Array.isArray(history)) {
      const extraHistoryFigures = {
        'ottoman-post-classical': [
          {
            name: 'عثمان الموصلي',
            role: 'ملحن ومغنٍ وشاعر وعالم بالمقام',
            years: '1854–1923',
            description: 'موسيقي عراقي من أواخر العهد العثماني ارتبط بنقل وتطوير المقام العراقي والتقاليد الغنائية المتصلة به. ويُذكر أيضًا لدوره في التلاوة والشعر وانتقال المادة اللحنية بين العراق وبلاد الشام وشبكات الثقافة العثمانية.'
          }
        ],
        'golden-age': [
          {
            name: 'الأخوان رحباني',
            role: 'ملحنان وكاتبان مسرحيان وشاعران غنائيان',
            years: 'نشطا أساسًا بين الخمسينيات والثمانينيات',
            description: 'الأخوان رحباني هما عاصي ومنصور الرحباني، وهما من أهم الثنائيات الإبداعية في الموسيقى والمسرح الغنائي العربي الحديث. جمعت أعمالهما بين العناصر اللبنانية المشرقية والفولكلور والتأليف المسرحي، خاصة في تعاونهما الكبير مع فيروز.'
          },
          {
            name: 'ليلى مراد',
            role: 'مطربة وممثلة',
            years: '1918–1995',
            description: 'مطربة وممثلة مصرية أصبحت من أبرز أصوات الغناء العربي والسينما الموسيقية في القرن العشرين. وتنتمي أعمالها إلى المرحلة المركزية من الأغنية المدينية المصرية والفيلم الغنائي في منتصف القرن العشرين.'
          }
        ],
        'modern-pop-transition': [
          {
            name: 'سيمون شاهين',
            role: 'عازف عود وكمان وملحن',
            years: '1955–',
            description: 'موسيقي فلسطيني-أمريكي عُرف بأدائه على العود والكمان وبأعمال تربط الموسيقى العربية الفنية بالتأليف المعاصر والعمل الجماعي. أسهمت مسيرته في تقديم التراث الآلي العربي في سياقات أكاديمية وحفلية وعابرة للثقافات.'
          },
          {
            name: 'نور الملاح',
            role: 'ملحن وموزع',
            years: '',
            description: 'ملحن وموزع لبناني ارتبط بإنتاج الأغنية العربية التجارية في أواخر القرن العشرين. تشير المصادر المتاحة إلى حضوره بوصفه ملحنًا وإلى صلته بعائلة فنية، لكن التفاصيل البيوغرافية الأساسية عنه ليست موثقة على نحو متسق.'
          },
          {
            name: 'عصام جاد',
            role: 'ملحن وكاتب أغانٍ',
            years: '',
            description: 'ملحن وكاتب أغانٍ ارتبط بريبرتوار الأغنية العربية الشعبية والحديثة، بما في ذلك أعمال غناها مطربون معروفون في أواخر القرن العشرين. وتبقى المعلومات المنشورة عنه محدودة، لذلك يُقدَّم أساسًا من خلال دوره في صناعة الأغنية.'
          },
          {
            name: 'عبده داغر',
            role: 'عازف كمان وملحن',
            years: '1936–2021',
            description: 'عازف كمان وملحن مصري عُرف بأسلوب شديد الخصوصية في الارتجال المقامي والتفسير الآلي. شارك مع كبار المطربين المصريين وأسهم في الحفاظ على تقليد ارتجالي وتري داخل الأداء الموسيقي العربي في القرن العشرين.'
          },
          {
            name: 'جوزيف عازار',
            role: 'مطرب ومؤدٍ في المسرح الغنائي',
            years: '1942–',
            description: 'مطرب ومؤدٍ لبناني عُرف بحضوره في المسرح الغنائي اللبناني منذ أوائل الستينيات. ويرتبط خاصة بريبرتوار الأوبريت والأعمال المسرحية التي أسهمت في تشكيل الموسيقى المسرحية اللبنانية الحديثة.'
          },
          {
            name: 'ملحم بركات',
            role: 'مطرب وملحن',
            years: '1945–2016',
            description: 'مطرب وملحن لبناني عُرف بقوة أدائه الصوتي وبغناء وتلحين عدد من الأغاني العربية واسعة الانتشار. وتمثل أعماله مرحلة انتقال الأغنية اللبنانية من النماذج المسرحية الوسطى إلى أشكال حديثة أكثر جماهيرية.'
          },
          {
            name: 'عمر خيرت',
            role: 'مؤلف موسيقي وعازف بيانو وموزع',
            years: '1948–',
            description: 'مؤلف موسيقي وعازف بيانو مصري اشتهر بأعماله الأوركسترالية وموسيقى الأفلام والمسلسلات التي وصلت إلى جمهور واسع. تعتمد كتابته على لغة لحنية عربية ضمن نسيج آلي كبير وصياغات قريبة من الموسيقى السيمفونية.'
          }
        ],
        'digital-platform-era': [
          {
            name: 'سامي خشيبون',
            role: 'عازف كمان ومدرس',
            years: '1970–',
            description: 'عازف كمان ومدرس فلسطيني من الجليل عُرف بالنشاط في الأداء والتعليم ضمن الموسيقى العربية وتقاليدها الآلية. تمثل أعماله استمرارًا معاصرًا للممارسة الأدائية العربية من خلال التعليم والعمل الجماعي والحفلات.'
          }
        ]
      };

      Object.entries(extraHistoryFigures).forEach(([eraId, figures]) => {
        const era = history.find((item) => item.id === eraId);
        if (!era) return;
        if (!Array.isArray(era.figures)) era.figures = [];
        figures.forEach((figure) => {
          const exists = era.figures.some((existing) => {
            const existingName = typeof existing === 'string' ? existing : existing?.name;
            return existingName === figure.name;
          });
          if (!exists) era.figures.push(figure);
        });
      });
    }
  </script>
