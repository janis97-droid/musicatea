<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>404 | الصفحة غير موجودة</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .not-found-shell {
      max-width: 680px;
      width: 100%;
      padding: 36px 28px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.01) 100%), var(--bg2);
      box-shadow: 0 18px 42px rgba(0,0,0,0.24);
    }
    .not-found-code {
      font-size: clamp(3.4rem, 10vw, 5.5rem);
      font-weight: 900;
      line-height: 1;
      color: var(--gold-light);
      margin-bottom: 14px;
    }
    .not-found-shell h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      margin-bottom: 12px;
      color: var(--text);
    }
    .not-found-shell p {
      color: var(--text-muted);
      line-height: 1.9;
      margin-bottom: 22px;
    }
    .not-found-actions {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .not-found-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid rgba(200,164,90,0.26);
      background: rgba(200,164,90,0.12);
      color: var(--gold-light);
      font-weight: 800;
      transition: all 0.25s var(--ease);
    }
    .not-found-btn:hover {
      background: rgba(200,164,90,0.18);
      border-color: rgba(200,164,90,0.42);
      transform: translateY(-1px);
    }
    .not-found-btn.secondary {
      background: rgba(255,255,255,0.03);
      border-color: rgba(255,255,255,0.08);
      color: var(--text-muted);
    }
    .not-found-btn.secondary:hover {
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }
  </style>
</head>
<body>
  <main class="not-found-shell">
    <div class="not-found-code">404</div>
    <h1>الصفحة غير موجودة</h1>
    <p>
      عذرًا، الصفحة التي تبحث عنها غير متوفرة أو ربما تم نقلها إلى رابط آخر.
      يمكنك العودة إلى الصفحة الرئيسية أو زيارة الأقسام الأساسية في موقع موسيقتي.
    </p>
    <div class="not-found-actions">
      <a href="/index.html" class="not-found-btn">العودة إلى الرئيسية</a>
      <a href="/library.html" class="not-found-btn secondary">مكتبة النوتات</a>
      <a href="/maqamat.html" class="not-found-btn secondary">المقامات</a>
    </div>
  </main>
</body>
</html>
