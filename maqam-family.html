<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عائلة المقام | موسيقتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css" />
  <style>
    .family-hero {
      padding: 56px 5% 38px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
    }

    .breadcrumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      font-size: 0.86rem;
      color: var(--text-dim);
    }

    .breadcrumbs a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.25s ease;
    }

    .breadcrumbs a:hover {
      color: var(--gold);
    }

    .family-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .family-title-block h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 900;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .family-title-block p {
      max-width: 760px;
      color: var(--text-muted);
      line-height: 1.9;
      font-size: 1rem;
      margin: 0;
    }

    .family-badge-large {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(200,164,90,0.22);
      font-size: 0.86rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .family-content {
      padding: 42px 5% 90px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .family-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 34px;
    }

    .summary-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
    }

    .summary-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.7;
    }

    .family-section-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .family-section-header h2 {
      font-size: 1.28rem;
      font-weight: 800;
      margin: 0;
    }

    .family-section-header span {
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    #family-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 20px;
    }

    .family-maqam-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      transition: all 0.35s var(--ease);
    }

    .family-maqam-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      border-color: rgba(200,164,90,0.28);
    }

    .family-maqam-card.main {
      border-color: rgba(200,164,90,0.3);
      box-shadow: 0 0 0 1px rgba(200,164,90,0.08) inset;
    }

    .family-maqam-accent {
      height: 4px;
      background: var(--maqam-color, var(--gold));
    }

    .family-maqam-body {
      padding: 22px;
    }

    .main-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--gold-dim);
      border: 1px solid rgba(200,164,90,0.2);
      color: var(--gold);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .family-maqam-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .family-maqam-header h3 {
      font-size: 1.28rem;
      font-weight: 900;
      margin: 0;
      color: var(--text);
    }

    .family-maqam-latin {
      font-size: 0.84rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .family-maqam-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.8;
      margin-bottom: 14px;
    }

    .family-maqam-meta {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .family-meta-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--text-dim);
      line-height: 1.7;
    }

    .family-meta-label {
      min-width: 78px;
      color: var(--text);
      font-weight: 700;
    }

    .tonic-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tonic-pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border2);
      color: var(--text-muted);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .family-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border2);
      font-size: 0.82rem;
      color: var(--text-dim);
    }

    .family-card-arrow {
      color: var(--gold);
      font-size: 1rem;
      transition: transform 0.25s ease;
    }

    .family-maqam-card:hover .family-card-arrow {
      transform: translateX(-4px);
    }

    .family-empty {
      background: var(--bg2);
      border: 1px dashed var(--border2);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      color: var(--text-dim);
    }

    @media (max-width: 700px) {
      .family-title-row {
        flex-direction: column;
        align-items: flex-start;
      }

      #family-grid {
        grid-template-columns: 1fr;
      }

      .family-content {
        padding: 32px 4% 80px;
      }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <a href="index.html" class="nav-logo">موسيقتي</a>
    <div class="nav-links">
      <a href="index.html">الصفحة الرئيسية</a>
      <a href="library.html">مكتبة النوتات</a>
      <a href="ensemble.html">إنسامبل الأنغام</a>
      <a href="history.html">تاريخ الموسيقى</a>
      <a href="maqamat.html" class="active">مقاماتي</a>
      <a href="rhythms.html">إيقاعاتي</a>
    </div>
  </nav>

  <header class="family-hero">
    <div class="breadcrumbs">
      <a href="index.html">الرئيسية</a>
      <span>›</span>
      <a href="maqamat.html">المقامات</a>
      <span>›</span>
      <span id="breadcrumb-family">عائلة المقام</span>
    </div>

    <div class="family-title-row">
      <div class="family-title-block">
        <h1 id="family-title">عائلة المقام</h1>
        <p id="family-description">جاري تحميل معلومات العائلة...</p>
      </div>
      <div class="family-badge-large" id="family-count-badge">0 مقامات</div>
    </div>
  </header>

  <main class="family-content">
    <section class="family-summary" id="family-summary"></section>

    <section>
      <div class="family-section-header">
        <h2>مقامات العائلة</h2>
        <span id="family-section-count"></span>
      </div>
      <div id="family-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <span class="footer-logo">موسيقتي</span>
    <span>© 2025 Musicatea</span>
  </footer>

  <script src="data/maqamat.js"></script>
  <script src="assets/ui.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const familyId = params.get('family');

    const familyTitle = document.getElementById('family-title');
    const familyDescription = document.getElementById('family-description');
    const familyCountBadge = document.getElementById('family-count-badge');
    const familySectionCount = document.getElementById('family-section-count');
    const breadcrumbFamily = document.getElementById('breadcrumb-family');
    const familyGrid = document.getElementById('family-grid');
    const familySummary = document.getElementById('family-summary');

    const familyDescriptions = {
      rast: "عائلة راست من أهم العائلات في الموسيقى العربية، وتتميّز بالاستقرار والرصانة وثراء التحويلات اللحنية. تشترك مقاماتها في جنس القرار من طابع الراست، ثم تتنوع في الأجناس العليا.",
      bayat: "عائلة بيات من أكثر العائلات حضوراً في الغناء العربي الشعبي والديني، وتمتاز بالدفء والحميمية وقابلية التعبير الصوتي العالي.",
      nahawand: "عائلة نهاوند تجمع بين الحزن والرومانسية، وتُستخدم كثيراً في القوالب الغنائية الحديثة والكلاسيكية، مع إمكانيات غنية للتلوين والتصعيد.",
      ajam: "عائلة عجم عائلة مشرقة واضحة البناء، قريبة من السلم الكبير الغربي، وتناسب الأعمال الرسمية والاحتفالية والأوركسترالية.",
      kurd: "عائلة كرد ذات طابع بسيط ومباشر وخالٍ من أرباع التون، وتُستخدم بكثرة في الألحان الشعبية والوجدانية.",
      hijaz: "عائلة حجاز من أكثر العائلات تميزاً درامياً وروحانياً، وتُعرف بقفزتها اللحنية المميزة وما تمنحه من شحنة تعبيرية قوية.",
      sikah: "عائلة سيكاه ذات طابع روحاني وداخلي، وترتبط بالإنشاد والتلاوة والجو الصوفي، وتعتمد على أرباع التون بشكل أساسي.",
      saba: "عائلة صبا من أكثر العائلات العربية تعبيراً عن الحزن والألم والأنين، وتحتاج حساسية عالية في الأداء والصياغة.",
      nawa_athar: "عائلة نوى أثر عائلة مركبة وملونة، تجمع بين ألوان لحنية خاصة وتمنح المؤلف مجالاً واسعاً للدراما والتحويل."
    };

    function createSummaryCard(label, value) {
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.innerHTML = `
        <div class="summary-label">${label}</div>
        <div class="summary-value">${value}</div>
      `;
      return card;
    }

    function createFamilyMaqamCard(maqam) {
      const card = document.createElement('a');
      card.className = 'family-maqam-card' + (maqam.is_main ? ' main' : '');
      card.href = `maqam.html?id=${maqam.id}`;
      card.style.setProperty('--maqam-color', maqam.mood_color || 'var(--gold)');

      const tonicHtml = (maqam.tonic_options || [])
        .map(t => `<span class="tonic-pill">${t}</span>`)
        .join('');

      const upperJins = maqam.jins?.upper?.map(j => `${j.name} على ${j.root}`).join(' / ') || '—';
      const lowerJins = maqam.jins?.lower ? `${maqam.jins.lower.name} على ${maqam.jins.lower.root}` : '—';

      card.innerHTML = `
        <div class="family-maqam-accent"></div>
        <div class="family-maqam-body">
          ${maqam.is_main ? `<div class="main-tag">المقام الرئيسي</div>` : ''}
          <div class="family-maqam-header">
            <h3>${maqam.name}</h3>
            <span class="family-maqam-latin">${maqam.latin}</span>
          </div>

          <p class="family-maqam-desc">${maqam.description || ''}</p>

          <div class="family-maqam-meta">
            <div class="family-meta-row">
              <span class="family-meta-label">القرار</span>
              <div class="tonic-list">${tonicHtml || '<span class="tonic-pill">—</span>'}</div>
            </div>
            <div class="family-meta-row">
              <span class="family-meta-label">الجنس السفلي</span>
              <span>${lowerJins}</span>
            </div>
            <div class="family-meta-row">
              <span class="family-meta-label">الجنس العلوي</span>
              <span>${upperJins}</span>
            </div>
          </div>

          <div class="family-card-footer">
            <span>${(maqam.examples || []).length} أمثلة</span>
            <span class="family-card-arrow">←</span>
          </div>
        </div>
      `;

      return card;
    }

    function renderFamilyPage() {
      if (!familyId) {
        familyTitle.textContent = 'عائلة غير محددة';
        breadcrumbFamily.textContent = 'عائلة غير محددة';
        familyDescription.textContent = 'لم يتم تحديد العائلة المطلوبة في الرابط.';
        familyGrid.innerHTML = '<div class="family-empty">الرابط غير مكتمل. عد إلى صفحة المقامات واختر عائلة.</div>';
        familySummary.appendChild(createSummaryCard('الحالة', 'الرابط غير صالح'));
        return;
      }

      const familyMaqamat = getMaqamatByFamily(familyId);
      const mainMaqam = familyMaqamat.find(m => m.is_main) || familyMaqamat[0];

      if (!familyMaqamat.length || !mainMaqam) {
        familyTitle.textContent = 'العائلة غير موجودة';
        breadcrumbFamily.textContent = 'غير موجودة';
        familyDescription.textContent = 'لم يتم العثور على بيانات لهذه العائلة.';
        familyGrid.innerHTML = '<div class="family-empty">لا توجد بيانات متاحة لهذه العائلة حالياً.</div>';
        familySummary.appendChild(createSummaryCard('الحالة', 'لا توجد بيانات'));
        return;
      }

      familyTitle.textContent = `عائلة ${mainMaqam.name}`;
      breadcrumbFamily.textContent = `عائلة ${mainMaqam.name}`;
      familyDescription.textContent = familyDescriptions[familyId] || mainMaqam.description || '';
      familyCountBadge.textContent = `${familyMaqamat.length} مقامات`;
      familySectionCount.textContent = `${familyMaqamat.length} ضمن هذه العائلة`;

      const totalExamples = familyMaqamat.reduce((sum, m) => sum + ((m.examples || []).length), 0);
      const lowerJinsName = mainMaqam.jins?.lower?.name || '—';
      const dominant = mainMaqam.dominant || '—';

      familySummary.appendChild(createSummaryCard('المقام الأم', mainMaqam.name));
      familySummary.appendChild(createSummaryCard('جنس القرار المشترك', lowerJinsName));
      familySummary.appendChild(createSummaryCard('درجة الغَمّاز', dominant));
      familySummary.appendChild(createSummaryCard('إجمالي الأمثلة', `${totalExamples} أمثلة`));

      const ordered = [
        ...familyMaqamat.filter(m => m.is_main),
        ...familyMaqamat.filter(m => !m.is_main)
      ];

      ordered.forEach(m => {
        familyGrid.appendChild(createFamilyMaqamCard(m));
      });
    }

    renderFamilyPage();
  </script>
</body>
</html>
