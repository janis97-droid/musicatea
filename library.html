  <main id="main-content">
    <header class="page-hero">
      <h1>مكتبة النوتات</h1>
      <p>نوتات موسيقية عربية وغربية — قابلة للتصفية والتحميل المجاني.</p>
    </header>

    <div class="filters" role="search" aria-label="فلترة النوتات">
      <label for="system" class="sr-only">النظام</label>
      <select id="system">
        <option value="arabic">التدوين الشرقي</option>
        <option value="western">التدوين الغربي</option>
      </select>

      <label for="type" class="sr-only">النوع</label>
      <select id="type">
        <option value="">كل الأنواع</option>
        <option value="song">أغنية</option>
        <option value="instrumental">معزوفة</option>
      </select>

      <label for="maqam" class="sr-only">المقام</label>
      <select id="maqam">
        <option value="">كل المقامات</option>
      </select>

      <label for="scale" class="sr-only">السلم</label>
      <select id="scale" style="display:none;">
        <option value="">كل السلالم</option>
      </select>

      <label for="tonic" class="sr-only">القرار</label>
      <select id="tonic">
        <option value="">كل القرارات</option>
      </select>

      <label for="search" class="sr-only">بحث</label>
      <input id="search" type="text" placeholder="ابحث بالعنوان أو الملحن أو المؤدي...">
    </div>

    <div id="list" class="grid"></div>
