<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>المكتبة</title>
<link rel="stylesheet" href="assets/style.css">
</head>
 
<body>

<h2 class="center">مكتبة النوتات</h2>

<div class="filters center">

  <!-- system -->
  <select id="system">
    <option>نوتات شرقية</option>
    <option>نوتات غربية</option>
  </select>

  <!-- type -->
  <select id="type">
    <option>الكل</option>
    <option>أغنية</option>
    <option>معزوفة</option>
  </select>

  <!-- maqam (arabic only) -->
  <select id="maqam">
    <option value="">كل المقامات</option>
  </select>

  <!-- scale (western only) -->
  <select id="scale" style="display:none;">
    <option value="">All Scales</option>
  </select>

  <!-- tonic -->
  <select id="tonic">
    <option value="">الدرجة</option>
  </select>

  <!-- search -->
  <input id="search" placeholder="بحث..." />

</div>

<div id="list" class="grid"></div>

<script src="data/sheets.js"></script>
<script src="assets/app.js"></script>

</body>
</html>
