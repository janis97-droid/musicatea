<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المكتبة — موسيقتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
 
  <!-- NAV -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">موسيقتي</a>
    <div class="nav-links">
      <a href="library.html" class="active">المكتبة</a>
      <a href="wiki.html">الموسوعة</a>
      <a href="index.html#about">عن المشروع</a>
    </div>
  </nav>
 
  <!-- HERO -->
  <header class="page-hero">
    <h1>مكتبة النوتات</h1>
    <p>نوتات موسيقية عربية وغربية — قابلة للتصفية والتحميل.</p>
  </header>
 
  <!-- FILTERS -->
  <div class="filters">
    <select id="system">
      <option>نوتات شرقية</option>
      <option>نوتات غربية</option>
    </select>
 
    <select id="type">
      <option>الكل</option>
      <option>أغنية</option>
      <option>معزوفة</option>
    </select>
 
    <select id="maqam">
      <option value="">كل المقامات</option>
    </select>
 
    <select id="scale" style="display:none;">
      <option value="">All Scales</option>
    </select>
 
    <select id="tonic">
      <option value="">الدرجة</option>
    </select>
 
    <input id="search" type="text" placeholder="بحث بالاسم أو الملحن...">
  </div>
 
  <!-- GRID -->
  <div id="list" class="grid"></div>
 
  <!-- SCRIPTS — order matters -->
  <script src="data/sheets.js"></script>
  <script src="data/maqamat.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/app.js"></script>
 
</body>
</html>
