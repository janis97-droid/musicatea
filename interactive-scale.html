<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المقامات التفاعلية | موسيقتي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#0c0b09;
      --bg2:#111009;
      --surface:#181610;
      --surface2:#1e1c14;
      --border:rgba(255,255,255,0.07);
      --border2:rgba(255,255,255,0.04);
      --text:#ede8df;
      --text-muted:#b0a890;
      --text-dim:#645e50;
      --gold:#c8a45a;
      --gold-light:#e2c47e;
      --gold-dim:rgba(200,164,90,0.10);
      --blue:#7ba8d4;
      --blue-light:#a8ccee;
      --blue-dim:rgba(123,168,212,0.10);
      --ease:cubic-bezier(0.22,1,0.36,1);
      --sidebar-w:260px;
    }

    *,*::before,*::after {
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html { scroll-behavior:smooth; }

    body {
      font-family:'Cairo',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }

    a {
      color:inherit;
      text-decoration:none;
    }

    .site-nav {
      position:fixed;
      top:0;
      right:0;
      left:0;
      z-index:200;
      background:rgba(12,11,9,0.95);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--border);
      height:56px;
      display:flex;
      align-items:center;
    }

    .nav-inner {
      width:100%;
      padding:0 28px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .nav-right {
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
      flex:1;
    }

    .nav-logo {
      font-size:1.15rem;
      font-weight:900;
      color:var(--gold-light);
      flex-shrink:0;
    }

    .nav-links {
      display:flex;
      gap:2px;
      flex-shrink:0;
    }

    .nav-links a {
      font-size:0.8rem;
      color:var(--text-dim);
      padding:5px 10px;
      border-radius:7px;
      font-weight:600;
      transition:all .2s;
    }

    .nav-links a:hover {
      color:var(--text-muted);
      background:var(--surface);
    }

    .nav-links a.active {
      color:var(--gold);
      background:var(--gold-dim);
    }

    .nav-breadcrumb {
      display:flex;
      align-items:center;
      gap:10px;
      font-size:0.78rem;
      color:var(--text-dim);
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border2);
      min-width:0;
    }

    .nav-breadcrumb a,
    .nav-breadcrumb span {
      display:inline-flex;
      align-items:center;
    }

    .nav-breadcrumb a {
      transition:color .2s;
    }

    .nav-breadcrumb a:hover {
      color:var(--gold);
    }

    .nav-breadcrumb .sep {
      color:var(--border);
    }

    .nav-breadcrumb .current {
      color:var(--gold-light);
      font-weight:800;
    }

    .mobile-toggle {
      display:none;
      align-items:center;
      gap:6px;
      padding:6px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--surface);
      color:var(--text-muted);
      font-family:inherit;
      font-size:0.8rem;
      font-weight:700;
      cursor:pointer;
    }

    .shell {
      display:flex;
      padding-top:56px;
      min-height:100vh;
    }

    .sidebar {
      position:fixed;
      top:56px;
      right:0;
      width:var(--sidebar-w);
      height:calc(100vh - 56px);
      overflow-y:auto;
      border-left:1px solid var(--border);
      background:var(--bg2);
      display:flex;
      flex-direction:column;
      scrollbar-width:thin;
      scrollbar-color:var(--border) transparent;
    }

    .sidebar::-webkit-scrollbar { width:4px; }
    .sidebar::-webkit-scrollbar-thumb {
      background:var(--border);
      border-radius:4px;
    }

    .sidebar-header {
      padding:20px 18px 14px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }

    .sidebar-family-label {
      font-size:0.66rem;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color:var(--gold);
      font-weight:700;
      margin-bottom:4px;
    }

    .sidebar-family-name {
      font-size:1.1rem;
      font-weight:900;
    }

    .sidebar-family-sub {
      font-size:0.75rem;
      color:var(--text-dim);
      margin-top:2px;
    }

    .sidebar-list {
      list-style:none;
      padding:10px 0;
      flex:1;
    }

    .sidebar-item {
      display:block;
      padding:0 10px;
      margin-bottom:2px;
    }

    .sidebar-btn {
      width:100%;
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:10px;
      border:none;
      background:none;
      color:var(--text-muted);
      font-family:inherit;
      font-size:0.9rem;
      font-weight:600;
      cursor:pointer;
      text-align:right;
      transition:all .25s var(--ease);
      position:relative;
    }

    .sidebar-btn:hover {
      background:var(--surface);
      color:var(--text);
    }

    .sidebar-btn.active {
      background:var(--gold-dim);
      color:var(--gold-light);
      font-weight:800;
    }

    .sidebar-btn.active::before {
      content:'';
      position:absolute;
      right:0;
      top:20%;
      height:60%;
      width:3px;
      background:var(--gold);
      border-radius:2px 0 0 2px;
    }

    .sidebar-dot {
      width:7px;
      height:7px;
      border-radius:50%;
      background:currentColor;
      flex-shrink:0;
      opacity:0.5;
      transition:opacity .2s;
    }

    .sidebar-btn.active .sidebar-dot { opacity:1; }

    .sidebar-btn.main-maqam {
      color:var(--gold);
    }

    .sidebar-btn.main-maqam .sidebar-dot {
      background:var(--gold);
    }

    .sidebar-main-tag {
      font-size:0.6rem;
      letter-spacing:0.08em;
      background:var(--gold-dim);
      color:var(--gold);
      border:1px solid rgba(200,164,90,0.2);
      padding:2px 6px;
      border-radius:4px;
      margin-right:auto;
      font-weight:800;
    }

    .main {
      margin-right:var(--sidebar-w);
      flex:1;
      min-height:calc(100vh - 56px);
      overflow-y:auto;
    }

    .maqam-hero {
      padding:34px 5% 28px;
      border-bottom:1px solid var(--border);
      position:relative;
      overflow:hidden;
      background:linear-gradient(160deg,var(--bg2) 0%,var(--bg) 100%);
    }

    .maqam-hero::after {
      content:attr(data-name);
      position:absolute;
      left:-1%;
      top:50%;
      transform:translateY(-50%);
      font-size:clamp(6rem,16vw,13rem);
      font-weight:900;
      color:rgba(200,164,90,0.04);
      line-height:1;
      pointer-events:none;
      user-select:none;
    }

    .maqam-hero-inner {
      position:relative;
      max-width:860px;
    }

    .maqam-name-wrap {
      display:flex;
      align-items:baseline;
      gap:14px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }

    .maqam-name {
      font-size:clamp(2.2rem,5vw,3.6rem);
      font-weight:900;
      color:var(--gold-light);
      letter-spacing:-0.03em;
      line-height:1;
    }

    .maqam-latin {
      font-size:1rem;
      color:var(--text-dim);
      font-style:italic;
      font-weight:400;
    }

    .maqam-desc {
      color:var(--text-muted);
      font-size:1rem;
      line-height:1.85;
      max-width:680px;
    }

    .maqam-body {
      padding:28px 5% 80px;
      max-width:900px;
    }

    .sec-title {
      font-size:0.72rem;
      letter-spacing:0.13em;
      text-transform:uppercase;
      color:var(--gold);
      font-weight:800;
      margin-bottom:14px;
    }

    .staff-scale-box {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:18px;
      padding:24px 22px 20px;
      margin-bottom:28px;
    }

    .staff-scale-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:12px;
      margin-bottom:20px;
    }

    .staff-scale-title {
      font-size:0.9rem;
      font-weight:800;
      color:var(--text-muted);
    }

    .tonic-selector {
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .tonic-btn {
      padding:5px 13px;
      border-radius:8px;
      border:1px solid var(--border);
      background:var(--surface2);
      color:var(--text-dim);
      font-family:inherit;
      font-size:0.8rem;
      font-weight:700;
      cursor:pointer;
      transition:all .2s;
    }

    .tonic-btn:hover {
      border-color:rgba(200,164,90,.3);
      color:var(--text-muted);
    }

    .tonic-btn.active {
      background:var(--gold-dim);
      border-color:rgba(200,164,90,.45);
      color:var(--gold);
    }

    .staff-wrap {
      width:100%;
      overflow-x:auto;
      background:#181408;
      border-radius:10px;
      padding:16px 0 10px;
    }

    .staff-svg {
      display:block;
      width:100%;
      min-width:560px;
      overflow:visible;
    }

    .note-keys-row {
      display:flex;
      gap:5px;
      margin-top:14px;
    }

    .note-key {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      cursor:pointer;
      user-select:none;
    }

    .note-key-face {
      width:100%;
      min-height:58px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      border-radius:9px;
      border:1.5px solid var(--border);
      background:var(--surface2);
      font-size:.82rem;
      font-weight:700;
      color:var(--text-muted);
      transition:all .2s var(--ease);
      padding:5px 3px;
      gap:1px;
    }

    .note-key-face .acc {
      font-size:.58rem;
      color:var(--text-dim);
      line-height:1;
    }

    .note-key:hover .note-key-face {
      transform:translateY(-4px);
      box-shadow:0 8px 20px rgba(0,0,0,.4);
    }

    .note-key.active .note-key-face {
      background:rgba(200,164,90,.15);
      border-color:rgba(200,164,90,.6);
      color:var(--gold-light);
      transform:translateY(-5px);
      box-shadow:0 10px 24px rgba(200,164,90,.2);
    }

    .note-key.is-tonic .note-key-face {
      background:rgba(200,164,90,.14);
      border-color:var(--gold);
      color:var(--gold-light);
      font-weight:900;
    }

    .note-key-deg {
      font-size:.6rem;
      color:var(--text-dim);
      font-weight:600;
    }

    .note-key.active .note-key-deg {
      color:var(--gold);
    }

    .playbar {
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--border);
    }

    .play-btn {
      display:flex;
      align-items:center;
      gap:7px;
      padding:7px 16px;
      border-radius:9px;
      border:1px solid rgba(200,164,90,.3);
      background:var(--gold-dim);
      color:var(--gold);
      font-family:inherit;
      font-size:.8rem;
      font-weight:800;
      cursor:pointer;
      transition:all .2s;
    }

    .play-btn:hover {
      background:rgba(200,164,90,.2);
    }

    .play-btn.is-playing {
      border-color:rgba(200,164,90,.5);
      background:rgba(200,164,90,.18);
    }

    .status-bar {
      font-size:.74rem;
      color:var(--text-dim);
      min-height:16px;
      transition:color .3s;
      margin-right:auto;
    }

    .status-bar.on {
      color:var(--gold);
    }

    .info-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(175px,1fr));
      gap:12px;
      margin-bottom:28px;
    }

    .info-card {
      background:var(--surface);
      border:1px solid var(--border);
      border-radius:12px;
      padding:15px 17px;
    }

    .info-label {
      font-size:.68rem;
      color:var(--text-dim);
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:5px;
    }

    .info-value {
      font-size:.92rem;
      font-weight:700;
      color:var(--text);
    }

    .info-value.gold {
      color:var(--gold);
    }

    @media(max-width:768px) {
      .nav-inner {
        padding:0 16px;
      }

      .nav-right {
        gap:10px;
        min-width:0;
        flex:1;
      }

      .nav-links {
        display:none;
      }

      .nav-breadcrumb {
        padding:0;
        border:none;
        background:none;
        gap:6px;
        overflow:hidden;
      }

      .nav-breadcrumb .current {
        max-width:120px;
        overflow:hidden;
        text-overflow:ellipsis;
        white-space:nowrap;
      }

      .mobile-toggle {
        display:flex;
      }

      .sidebar {
        transform:translateX(100%);
        transition:transform .35s var(--ease);
        z-index:150;
      }

      .sidebar.open {
        transform:translateX(0);
      }

      .main {
        margin-right:0;
      }

      .maqam-hero {
        padding:24px 16px 22px;
      }

      .maqam-body {
        padding:24px 16px 72px;
      }
    }
  </style>
</head>
<body>

  <nav class="site-nav">
    <div class="nav-inner">
      <div class="nav-right">
        <a href="index.html" class="nav-logo">موسيقتي</a>

        <nav class="nav-links">
          <a href="index.html">الرئيسية</a>
          <a href="library.html">مكتبة النوتات</a>
          <a href="maqamat.html" class="active">مقاماتي</a>
          <a href="rhythms.html">إيقاعاتي</a>
          <a href="history.html">تاريخ الموسيقى</a>
          <a href="ensemble.html">إنسامبل الأنغام</a>
        </nav>

        <nav class="nav-breadcrumb" aria-label="مسار الصفحة">
          <a href="maqamat.html">المقامات</a>
          <span class="sep">›</span>
          <span class="current" id="current-maqam-label">راست</span>
        </nav>
      </div>

      <div style="display:flex;align-items:center;gap:10px">
        <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
          المقامات
        </button>
      </div>
    </div>
  </nav>

  <div class="shell">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main" id="main-panel">
      <div id="interactive-page-root"></div>
    </main>
  </div>

  <script src="data/maqamat.js"></script>
  <script src="data/interactive-maqamat.js"></script>
  <script src="assets/interactive-scale.js"></script>
</body>
</html>
