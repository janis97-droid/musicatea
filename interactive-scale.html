<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عائلة الراست | موسيقتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0c0b09; --bg2:#111009; --surface:#181610; --surface2:#1e1c14;
      --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.04);
      --text:#ede8df; --text-muted:#b0a890; --text-dim:#645e50;
      --gold:#c8a45a; --gold-light:#e2c47e; --gold-dim:rgba(200,164,90,0.10);
      --blue:#7ba8d4; --blue-light:#a8ccee; --blue-dim:rgba(123,168,212,0.10);
      --ease:cubic-bezier(0.22,1,0.36,1);
      --sidebar-w:280px;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'Cairo',sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    a { color:inherit; text-decoration:none; }

    .site-nav{
      position:fixed;
      top:0;
      right:0;
      left:0;
      z-index:200;
      background:rgba(12,11,9,0.96);
      backdrop-filter:blur(18px);
      border-bottom:1px solid var(--border);
      height:64px;
      display:flex;
      align-items:center;
    }

    .nav-inner{
      width:100%;
      padding:0 24px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .nav-right{
      display:flex;
      align-items:center;
      gap:18px;
      min-width:0;
    }

    .nav-logo{
      font-size:1.2rem;
      font-weight:900;
      color:var(--gold-light);
      white-space:nowrap;
    }

    .nav-breadcrumb{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      font-size:0.84rem;
      color:var(--text-dim);
      min-width:0;
    }

    .nav-breadcrumb a{
      color:var(--text-dim);
      transition:color .2s;
    }

    .nav-breadcrumb a:hover{
      color:var(--gold);
    }

    .nav-breadcrumb .sep{
      color:var(--border);
    }

    .nav-breadcrumb .current{
      color:var(--text-muted);
      font-weight:800;
    }

    .nav-links{
      display:flex;
      gap:4px;
    }

    .nav-links a{
      font-size:0.82rem;
      color:var(--text-dim);
      padding:6px 12px;
      border-radius:8px;
      font-weight:700;
      transition:all .2s;
    }

    .nav-links a:hover{
      color:var(--text-muted);
      background:var(--surface);
    }

    .nav-links a.active{
      color:var(--gold);
      background:var(--gold-dim);
    }

    .mobile-toggle{
      display:none;
      align-items:center;
      gap:6px;
      padding:7px 12px;
      border:1px solid var(--border);
      border-radius:9px;
      background:var(--surface);
      color:var(--text-muted);
      font-family:inherit;
      font-size:0.8rem;
      font-weight:800;
      cursor:pointer;
    }

    .shell{
      display:flex;
      padding-top:64px;
      min-height:100vh;
    }

    .sidebar{
      position:fixed;
      top:64px;
      right:0;
      width:280px;
      height:calc(100vh - 64px);
      overflow-y:auto;
      border-left:1px solid var(--border);
      background:linear-gradient(180deg, #111009 0%, #0d0c08 100%);
      display:flex;
      flex-direction:column;
      scrollbar-width:thin;
      scrollbar-color:var(--border) transparent;
    }

    .sidebar::-webkit-scrollbar{width:4px}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

    .sidebar-header{
      padding:22px 18px 16px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }

    .sidebar-family-label{
      font-size:0.66rem;
      letter-spacing:0.14em;
      text-transform:uppercase;
      color:var(--gold);
      font-weight:800;
      margin-bottom:6px;
    }

    .sidebar-family-name{
      font-size:1.18rem;
      font-weight:900;
      color:var(--text);
      line-height:1.3;
    }

    .sidebar-family-sub{
      font-size:0.78rem;
      color:var(--text-dim);
      margin-top:4px;
      line-height:1.6;
    }

    .sidebar-list{
      list-style:none;
      padding:12px 0;
      flex:1;
    }

    .sidebar-item{
      display:block;
      padding:0 10px;
      margin-bottom:4px;
    }

    .sidebar-btn{
      width:100%;
      display:flex;
      align-items:center;
      gap:10px;
      padding:12px 12px;
      border-radius:12px;
      border:none;
      background:none;
      color:var(--text-muted);
      font-family:inherit;
      font-size:0.92rem;
      font-weight:700;
      cursor:pointer;
      text-align:right;
      transition:all .25s var(--ease);
      position:relative;
    }

    .sidebar-btn:hover{
      background:var(--surface);
      color:var(--text);
    }

    .sidebar-btn.active{
      background:var(--gold-dim);
      color:var(--gold-light);
      font-weight:800;
    }

    .sidebar-btn.active::before{
      content:'';
      position:absolute;
      right:0;
      top:18%;
      height:64%;
      width:3px;
      background:var(--gold);
      border-radius:2px 0 0 2px;
    }

    .sidebar-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:currentColor;
      flex-shrink:0;
      opacity:0.55;
      transition:opacity .2s;
    }

    .sidebar-btn.active .sidebar-dot{
      opacity:1;
    }

    .sidebar-btn.main-maqam{
      color:var(--gold);
    }

    .sidebar-btn.main-maqam .sidebar-dot{
      background:var(--gold);
    }

    .sidebar-main-tag{
      font-size:0.62rem;
      letter-spacing:0.08em;
      background:var(--gold-dim);
      color:var(--gold);
      border:1px solid rgba(200,164,90,0.2);
      padding:2px 6px;
      border-radius:5px;
      margin-right:auto;
      font-weight:800;
    }

    .main{
      margin-right:280px;
      flex:1;
      min-height:calc(100vh - 64px);
      overflow-y:auto;
    }

    .maqam-view{display:none;animation:fadeSlide .35s var(--ease)}
    .maqam-view.active{display:block}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .maqam-hero{
      padding:52px 5% 40px;
      border-bottom:1px solid var(--border);
      position:relative;
      overflow:hidden;
      background:linear-gradient(160deg,var(--bg2) 0%,var(--bg) 100%);
    }

    .maqam-hero::after{
      content:attr(data-name);
      position:absolute;
      left:-1%;
      top:50%;
      transform:translateY(-50%);
      font-size:clamp(6rem,16vw,13rem);
      font-weight:900;
      color:rgba(200,164,90,0.04);
      line-height:1;
      pointer-events:none;
      user-select:none;
    }

    .maqam-hero-inner{position:relative;max-width:860px}
    .maqam-name-wrap{display:flex;align-items:baseline;gap:14px;margin-bottom:10px;flex-wrap:wrap}
    .maqam-name{font-size:clamp(2.2rem,5vw,3.6rem);font-weight:900;color:var(--gold-light);letter-spacing:-0.03em;line-height:1}
    .maqam-latin{font-size:1rem;color:var(--text-dim);font-style:italic;font-weight:400}
    .maqam-desc{color:var(--text-muted);font-size:1rem;line-height:1.85;max-width:680px}

    .maqam-body{padding:36px 5% 80px;max-width:900px}
    .sec-title{font-size:0.72rem;letter-spacing:0.13em;text-transform:uppercase;color:var(--gold);font-weight:800;margin-bottom:14px}

    .staff-scale-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px 22px 20px;margin-bottom:28px}
    .staff-scale-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
    .staff-scale-title{font-size:0.9rem;font-weight:800;color:var(--text-muted)}
    .tonic-selector{display:flex;gap:6px}
    .tonic-btn{padding:5px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all .2s}
    .tonic-btn:hover{border-color:rgba(200,164,90,.3);color:var(--text-muted)}
    .tonic-btn.active{background:var(--gold-dim);border-color:rgba(200,164,90,.45);color:var(--gold)}

    .staff-wrap{width:100%;overflow-x:auto;background:#181408;border-radius:10px;padding:16px 0 10px}
    .staff-svg{display:block;width:100%;min-width:560px;overflow:visible}

    .note-keys-row{display:flex;gap:5px;margin-top:14px}
    .note-key{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;user-select:none}
    .note-key-face{width:100%;min-height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);font-size:.82rem;font-weight:700;color:var(--text-muted);transition:all .2s var(--ease);padding:5px 3px;gap:1px}
    .note-key-face .acc{font-size:.58rem;color:var(--text-dim);line-height:1}
    .note-key.jins-l .note-key-face{border-color:rgba(200,164,90,.25);color:#a08040}
    .note-key.jins-u .note-key-face{border-color:rgba(123,168,212,.25);color:#5a7aaa}
    .note-key:hover .note-key-face{transform:translateY(-4px);box-shadow:0 8px 20px rgba(0,0,0,.4)}
    .note-key.jins-l:hover .note-key-face{background:rgba(200,164,90,.08);border-color:rgba(200,164,90,.4);color:var(--gold-light)}
    .note-key.jins-u:hover .note-key-face{background:rgba(123,168,212,.08);border-color:rgba(123,168,212,.4);color:var(--blue-light)}
    .note-key.jins-l.active .note-key-face{background:rgba(200,164,90,.15);border-color:rgba(200,164,90,.6);color:var(--gold-light);transform:translateY(-5px);box-shadow:0 10px 24px rgba(200,164,90,.2)}
    .note-key.jins-u.active .note-key-face{background:rgba(123,168,212,.15);border-color:rgba(123,168,212,.6);color:var(--blue-light);transform:translateY(-5px);box-shadow:0 10px 24px rgba(123,168,212,.2)}
    .note-key.jins-l.is-tonic .note-key-face{background:rgba(200,164,90,.14);border-color:var(--gold);color:var(--gold-light);font-weight:900}
    .note-key.jins-u.is-tonic .note-key-face{background:rgba(123,168,212,.14);border-color:var(--blue);color:var(--blue-light);font-weight:900}
    .note-key.playing .note-key-face{background:var(--gold)!important;color:#0c0b09!important;border-color:var(--gold)!important}
    .note-key-deg{font-size:.6rem;color:var(--text-dim);font-weight:600}
    .note-key.active .note-key-deg{color:var(--gold)}

    .playbar{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
    .play-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:9px;border:1px solid rgba(200,164,90,.3);background:var(--gold-dim);color:var(--gold);font-family:inherit;font-size:.8rem;font-weight:800;cursor:pointer;transition:all .2s}
    .play-btn:hover{background:rgba(200,164,90,.2)}
    .play-btn.is-playing{border-color:rgba(200,164,90,.5);background:rgba(200,164,90,.18)}
    .status-bar{font-size:.74rem;color:var(--text-dim);min-height:16px;transition:color .3s;margin-right:auto}
    .status-bar.on{color:var(--gold)}

    .jins-legend{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
    .jins-chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:6px;font-size:.72rem;font-weight:700;color:var(--text-dim);border:1px solid var(--border2);background:var(--surface2)}
    .jins-chip .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

    @media(max-width:768px){
      .nav-links{display:none}
      .mobile-toggle{display:flex}
      .site-nav{height:auto;min-height:64px}
      .nav-inner{padding:10px 16px}
      .nav-right{flex-direction:column;align-items:flex-start;gap:4px}
      .nav-breadcrumb{font-size:0.78rem}
      .shell{padding-top:78px}
      .sidebar{
        top:78px;
        width:86vw;
        max-width:320px;
        height:calc(100vh - 78px);
        transform:translateX(100%);
        transition:transform .35s var(--ease);
        z-index:150;
      }
      .sidebar.open{transform:translateX(0)}
      .main{margin-right:0}
    }
  </style>
</head>
<body>
<nav class="site-nav">
  <div class="nav-inner">
    <div class="nav-right">
      <a href="index.html" class="nav-logo">موسيقتي</a>
      <nav class="nav-breadcrumb" id="family-breadcrumb">
        <a href="maqamat.html">المقامات</a>
        <span class="sep">›</span>
        <a href="maqam-family.html?family=rast" id="family-link">عائلة الراست</a>
        <span class="sep">›</span>
        <span class="current" id="current-maqam-label">راست</span>
      </nav>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <button class="mobile-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        المقامات
      </button>
      <nav class="nav-links">
        <a href="index.html">الرئيسية</a>
        <a href="library.html">المكتبة</a>
        <a href="maqamat.html" class="active">مقاماتي</a>
      </nav>
    </div>
  </div>
</nav>

<div class="shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-family-label">العائلة الموسيقية</div>
      <div class="sidebar-family-name">عائلة الراست</div>
      <div class="sidebar-family-sub">٨ مقامات · جنس الراست في القرار</div>
    </div>
    <ul class="sidebar-list">
      <li class="sidebar-item"><button class="sidebar-btn main-maqam active" data-maqam="rast"><span class="sidebar-dot"></span>راست<span class="sidebar-main-tag">أساسي</span></button></li>
      <li class="sidebar-item"><button class="sidebar-btn" data-maqam="kirdan"><span class="sidebar-dot"></span>كردان</button></li>
      <li class="sidebar-item"><button class="sidebar-btn" data-maqam="suznak"><span class="sidebar-dot"></span>سوزناك</button></li>
      <li class="sidebar-item"><button class="sidebar-btn" data-maqam="mahur"><span class="sidebar-dot"></span>ماهور</button></li>
      <li class="sidebar-item"><button class="sidebar-btn" data-maqam="sazkar"><span class="sidebar-dot"></span>سازكار</button></li>
      <li class="sidebar-item"><button class="sidebar-btn" data-maqam="nairuz"><span class="sidebar-dot"></span>نيروز</button></li>
      <li class="sidebar-item"><button class="sidebar-btn" data-maqam="delanshin"><span class="sidebar-dot"></span>دلنشين</button></li>
      <li class="sidebar-item"><button class="sidebar-btn" data-maqam="suzdelara"><span class="sidebar-dot"></span>سوزدلارا</button></li>
    </ul>
  </aside>

  <main class="main" id="main-panel">
    <div class="maqam-view active" id="view-rast">
      <div class="maqam-hero" data-name="راست">
        <div class="maqam-hero-inner">
          <div class="maqam-name-wrap"><h1 class="maqam-name">راست</h1><span class="maqam-latin">Rast</span></div>
          <p class="maqam-desc">يُلقَّب بـ«أبو المقامات» — مستقر، متوازن، وأساسي في الموسيقى العربية الكلاسيكية.</p>
        </div>
      </div>
      <div class="maqam-body">
        <div class="sec-title">السلّم التفاعلي</div>
        <div class="staff-scale-box">
          <div class="staff-scale-header">
            <div class="staff-scale-title">اضغط على نوتة أو زر للاستماع</div>
            <div class="tonic-selector">
              <button class="tonic-btn active" data-maqam="rast" data-tonic="do">دو</button>
              <button class="tonic-btn" data-maqam="rast" data-tonic="re">ري</button>
              <button class="tonic-btn" data-maqam="rast" data-tonic="fa">فا</button>
            </div>
          </div>
          <div class="staff-wrap"><svg class="staff-svg" id="staff-rast" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 170"></svg></div>
          <div class="note-keys-row" id="keys-rast"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const MAQAM_SCALES = {
  rast: {
    do:[{ar:'دو',p:'C4',acc:null,j:'l',d:'١'},{ar:'ري',p:'D4',acc:null,j:'l',d:'٢'},{ar:'مي',p:'E4',acc:'hf',j:'l',d:'٣'},{ar:'فا',p:'F4',acc:null,j:'l',d:'٤'},{ar:'صول',p:'G4',acc:null,j:'u',d:'٥'},{ar:'لا',p:'A4',acc:null,j:'u',d:'٦'},{ar:'سي',p:'B4',acc:'hf',j:'u',d:'٧'},{ar:'دو',p:'C5',acc:null,j:'u',d:'٨'}],
    re:[{ar:'ري',p:'D4',acc:null,j:'l',d:'١'},{ar:'مي',p:'E4',acc:null,j:'l',d:'٢'},{ar:'فا#',p:'F4',acc:'shf',j:'l',d:'٣'},{ar:'صول',p:'G4',acc:null,j:'l',d:'٤'},{ar:'لا',p:'A4',acc:null,j:'u',d:'٥'},{ar:'سي',p:'B4',acc:null,j:'u',d:'٦'},{ar:'دو#',p:'C5',acc:'shf',j:'u',d:'٧'},{ar:'ري',p:'D5',acc:null,j:'u',d:'٨'}],
    fa:[{ar:'فا',p:'F4',acc:null,j:'l',d:'١'},{ar:'صول',p:'G4',acc:null,j:'l',d:'٢'},{ar:'لا',p:'A4',acc:'hf',j:'l',d:'٣'},{ar:'سي♭',p:'B4',acc:'f',j:'l',d:'٤'},{ar:'دو',p:'C5',acc:null,j:'u',d:'٥'},{ar:'ري',p:'D5',acc:null,j:'u',d:'٦'},{ar:'مي',p:'E5',acc:'hf',j:'u',d:'٧'},{ar:'فا',p:'F5',acc:null,j:'u',d:'٨'}]
  }
};

const STAFF_Y = {C4:152,D4:145,E4:138,F4:131,G4:124,A4:117,B4:110,C5:103,D5:96,E5:89,F5:82,G5:75};
const LINES = [138,124,110,96,82];
const SVG_NS = 'http://www.w3.org/2000/svg';
const NOTE_RX = 8, NOTE_RY = 5.5;
const X_START = 82, X_GAP = (820 - X_START - 16) / 8;
const STATE = { rast: { tonic: 'do' } };

function svgEl(tag, attrs, parent) {
  const e = document.createElementNS(SVG_NS, tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

function noteColor(jins) {
  return jins === 'l' ? '#c8a45a' : '#7ba8d4';
}

function drawClef(svg) {
  svgEl('line',{x1:'52',y1:'82',x2:'52',y2:'138',stroke:'#b89a5a','stroke-width':'6','stroke-linecap':'round'},svg);
}

function renderStaff() {
  const tonic = STATE.rast.tonic;
  const notes = MAQAM_SCALES.rast[tonic];
  const svg = document.getElementById('staff-rast');
  svg.innerHTML = '';
  LINES.forEach(y => svgEl('line',{x1:'0',y1:y,x2:'820',y2:y,stroke:'#5a5038','stroke-width':'1.4'},svg));
  drawClef(svg);
  notes.forEach((note, i) => {
    const x = X_START + i * X_GAP + X_GAP * 0.4;
    const y = STAFF_Y[note.p];
    svgEl('ellipse',{cx:x,cy:y,rx:NOTE_RX,ry:NOTE_RY,fill:noteColor(note.j),transform:`rotate(-18,${x},${y})`},svg);
    svgEl('text',{x:x,y:y+50,'text-anchor':'middle','font-family':'Cairo,sans-serif','font-size':'11','font-weight':'700',fill:'#906818'},svg).textContent = note.d;
  });
}

function renderKeys() {
  const tonic = STATE.rast.tonic;
  const notes = MAQAM_SCALES.rast[tonic];
  const row = document.getElementById('keys-rast');
  row.innerHTML = '';
  notes.forEach((n, i) => {
    const div = document.createElement('div');
    div.className = `note-key jins-${n.j}${i===0||i===7 ? ' is-tonic' : ''}`;
    div.innerHTML = `<div class="note-key-face"><span>${n.ar}</span></div><div class="note-key-deg">${n.d}</div>`;
    row.appendChild(div);
  });
}

document.querySelectorAll('.tonic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tonic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    STATE.rast.tonic = btn.dataset.tonic;
    renderStaff();
    renderKeys();
  });
});

document.querySelectorAll('.sidebar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('current-maqam-label').textContent = btn.textContent.replace('أساسي', '').trim();
    document.getElementById('sidebar').classList.remove('open');
  });
});
