  <style>
    .intro-shell { max-width: 1140px; margin: 0 auto; padding: 48px 20px 88px; }
    .intro-hero { margin-bottom: 28px; }
    .intro-tag {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(200,164,90,.18);
      background: rgba(200,164,90,.08);
      color: var(--gold-light);
      font-size: .78rem;
      font-weight: 800;
      margin-bottom: 14px;
    }
    .intro-hero h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.12;
    }
    .intro-hero p {
      max-width: 820px;
      margin: 0;
      color: var(--text-muted);
      line-height: 1.9;
      font-size: 1rem;
    }
    .intro-quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 22px 0 20px;
    }
    .intro-pill {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 13px;
      border-radius: 999px;
      border: 1px solid rgba(200,164,90,.18);
      background: rgba(255,255,255,.03);
      color: var(--text-muted);
      text-decoration: none;
      font-size: .84rem;
      font-weight: 700;
      transition: all .22s var(--ease);
    }
    .intro-pill:hover {
      color: var(--gold-light);
      border-color: rgba(200,164,90,.38);
      background: rgba(200,164,90,.12);
    }
    .intro-note {
      border: 1px solid rgba(200,164,90,.14);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.015));
      padding: 18px 20px;
      color: var(--text-muted);
      line-height: 1.9;
      margin-bottom: 28px;
    }
    .intro-note strong { color: var(--text); }
    .intro-stack { display: grid; gap: 18px; }
    .intro-section {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.012));
      box-shadow: 0 16px 32px rgba(0,0,0,.14);
      overflow: hidden;
    }
    .intro-section-head {
      padding: 22px 24px 8px;
    }
    .intro-section-head h2 {
      margin: 0 0 8px;
      font-size: 1.22rem;
    }
    .intro-section-head p {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.85;
      font-size: .95rem;
    }
    .intro-subsections {
      padding: 16px 18px 20px;
      display: grid;
      gap: 12px;
    }
    .intro-acc-item {
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      background: rgba(255,255,255,.02);
      overflow: hidden;
    }
    .intro-acc-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      text-align: start;
    }
    .intro-acc-trigger span:first-child {
      font-weight: 800;
      font-size: .98rem;
    }
    .intro-acc-trigger span:last-child {
      color: var(--text-dim);
      transition: transform .22s ease;
      font-size: 1rem;
      line-height: 1;
    }
    .intro-acc-item.is-open .intro-acc-trigger span:last-child {
      transform: rotate(180deg);
    }
    .intro-acc-panel {
      padding: 0 18px 18px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .intro-term-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      padding-top: 14px;
    }
    .intro-term-card {
      border: 1px solid rgba(200,164,90,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.018);
      padding: 14px 14px 12px;
    }
    .intro-term-card h3 {
      margin: 0 0 6px;
      font-size: .95rem;
      color: var(--gold-light);
    }
    .intro-term-card p {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.82;
      font-size: .88rem;
    }
    .intro-term-card p + p { margin-top: 8px; }
    .intro-symbol-visual {
      width: 74px;
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
      border-radius: 14px;
      border: 1px solid rgba(200,164,90,.14);
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.018));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
    }
    .intro-symbol-visual svg {
      width: 52px;
      height: 52px;
      overflow: visible;
    }
    .intro-next {
      margin-top: 34px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .intro-next-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,.02);
    }
    .intro-next-card h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }
    .intro-next-card p {
      margin: 0 0 12px;
      color: var(--text-muted);
      line-height: 1.8;
      font-size: .92rem;
    }
    .intro-next-card a {
      color: var(--gold-light);
      text-decoration: none;
      font-weight: 800;
    }
    .intro-next-card a:hover { color: var(--gold); }
    @media (max-width: 680px) {
      .intro-shell { padding: 36px 16px 74px; }
      .intro-section-head { padding: 18px 18px 8px; }
      .intro-subsections { padding: 14px 14px 16px; }
      .intro-acc-trigger { padding: 14px 14px; }
      .intro-acc-panel { padding: 0 14px 14px; }
    }
  </style>
