<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="الإيقاعات العربية التفاعلية — تصفّح الإيقاعات الشرقية واستمع إليها.">
  <meta name="theme-color" content="#09090b">
  <link rel="alternate" hreflang="en" href="rhythms-en.html">
  <link rel="alternate" hreflang="ar" href="rhythms.html">
  <title>الإيقاعات التفاعلية | موسيقتي</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">

  <style>
    :root {
      --shell-height: calc(100vh - 88px);
      --panel-bg: rgba(255,255,255,0.02);
      --panel-border: rgba(255,255,255,0.08);
      --panel-border-strong: rgba(200,164,90,0.24);
      --panel-shadow: 0 18px 44px rgba(0,0,0,0.26);
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(200,164,90,0.08), transparent 28%),
        linear-gradient(180deg, rgba(13,18,26,1) 0%, rgba(8,12,20,1) 100%);
    }

    .site-nav {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(14px);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 16px 5%;
      border-bottom: 1px solid var(--border);
      background: rgba(9, 14, 23, 0.86);
    }

    .nav-right,
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-logo {
      font-size: 1.18rem;
      font-weight: 900;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
    }

    .nav-links,
    .nav-breadcrumb {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-links a,
    .nav-breadcrumb a,
    .nav-breadcrumb span {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .nav-links a.active,
    .nav-links a:hover,
    .nav-breadcrumb a:hover {
      color: var(--gold-light);
    }

    .nav-breadcrumb .current {
      color: var(--text);
      font-weight: 800;
    }

    .nav-breadcrumb .sep {
      opacity: 0.55;
    }

    .mobile-toggle,
    .lang-toggle,
    .playback-rate-btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 999px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.24s var(--ease);
    }

    .mobile-toggle,
    .lang-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .mobile-toggle:hover,
    .lang-toggle:hover,
    .playback-rate-btn:hover {
      border-color: rgba(200,164,90,0.36);
      color: var(--gold-light);
      transform: translateY(-1px);
    }

    .mobile-toggle {
      display: none;
    }

    .shell {
      display: grid;
      grid-template-columns: minmax(320px, 372px) minmax(0, 1fr);
      gap: 0;
      min-height: var(--shell-height);
    }

    .sidebar {
      position: sticky;
      top: 88px;
      height: var(--shell-height);
      overflow: hidden;
      border-left: 1px solid var(--border);
      background: rgba(7,12,20,0.86);
      backdrop-filter: blur(14px);
    }

    .sidebar-inner {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .sidebar-head {
      padding: 24px 22px 18px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(200,164,90,0.08) 0%, rgba(255,255,255,0.01) 100%);
    }

    .sidebar-kicker {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 800;
      margin-bottom: 10px;
    }

    .sidebar-head h1 {
      margin: 0 0 10px;
      font-size: 1.8rem;
      font-weight: 900;
      line-height: 1.2;
    }

    .sidebar-head p {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.8;
      font-size: 0.92rem;
    }

    .filters {
      padding: 18px 22px 16px;
      display: grid;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.015);
    }

    .filter-field {
      display: grid;
      gap: 7px;
    }

    .filter-field label {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 800;
    }

    .filter-field input,
    .filter-field select {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 0.92rem;
      outline: none;
      transition: all 0.24s var(--ease);
    }

    .filter-field input:focus,
    .filter-field select:focus {
      border-color: rgba(200,164,90,0.4);
      box-shadow: 0 0 0 3px rgba(200,164,90,0.08);
    }

    .filters-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 4px;
    }

    .results-count {
      color: var(--text-dim);
      font-size: 0.8rem;
      font-weight: 700;
    }

    .filters-reset {
      appearance: none;
      border: none;
      background: none;
      color: var(--gold-light);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      padding: 0;
    }

    .filters-reset:hover {
      color: var(--gold);
    }

    .rhythm-list {
      flex: 1 1 auto;
      overflow: auto;
      padding: 14px 14px 20px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .rhythm-nav-card {
      display: block;
      width: 100%;
      text-align: right;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 16px 16px 14px;
      cursor: pointer;
      transition: all 0.26s var(--ease);
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    .rhythm-nav-card:hover {
      transform: translateY(-2px);
      border-color: rgba(200,164,90,0.24);
      background: rgba(255,255,255,0.03);
    }

    .rhythm-nav-card.active {
      border-color: var(--panel-border-strong);
      box-shadow: inset 0 0 0 1px rgba(200,164,90,0.14), var(--panel-shadow);
      background: linear-gradient(180deg, rgba(200,164,90,0.10) 0%, rgba(255,255,255,0.03) 100%);
    }

    .rhythm-nav-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .rhythm-nav-name {
      font-size: 1.02rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1.35;
    }

    .rhythm-nav-latin {
      display: block;
      font-size: 0.79rem;
      color: var(--text-dim);
      font-style: italic;
      margin-top: 2px;
    }

    .rhythm-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text);
      white-space: nowrap;
      direction: ltr;
    }

    .rhythm-nav-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tempo-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(200,164,90,0.12);
      color: var(--gold-light);
      border: 1px solid rgba(200,164,90,0.2);
      font-size: 0.76rem;
      font-weight: 800;
    }

    .rhythm-nav-pattern {
      font-family: monospace;
      direction: ltr;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.88rem;
      letter-spacing: 0.01em;
    }

    .main {
      padding: 30px clamp(18px, 4vw, 42px) 70px;
    }

    .detail {
      max-width: 980px;
      margin: 0 auto;
    }

    .detail-card,
    .overview-grid article,
    .info-card,
    .examples-card,
    .related-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 24px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.18);
    }

    .detail-hero {
      padding: clamp(22px, 4vw, 34px);
      margin-bottom: 18px;
      background:
        radial-gradient(circle at top right, rgba(200,164,90,0.12), transparent 32%),
        linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.015) 100%);
    }

    .detail-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.76rem;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .detail-kicker::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    .detail-heading {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .detail-title {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.08;
      font-weight: 900;
      color: var(--text);
    }

    .detail-subtitle {
      margin: 8px 0 0;
      font-size: 1.05rem;
      color: var(--text-muted);
      font-style: italic;
    }

    .detail-summary {
      margin: 0;
      color: var(--text-muted);
      line-height: 1.95;
      font-size: 0.98rem;
      max-width: 72ch;
    }

    .hero-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .overview-grid article {
      padding: 18px 18px 16px;
    }

    .overview-grid h3 {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 0.73rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .overview-grid p {
      margin: 0;
      color: var(--text);
      font-weight: 800;
      line-height: 1.8;
      font-size: 0.95rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.9fr);
      gap: 18px;
      margin-bottom: 18px;
    }

    .info-card {
      padding: 24px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 16px;
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--text);
    }

    .section-title::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
    }

    .pattern-box {
      direction: ltr;
      text-align: center;
      font-family: monospace;
      font-size: 1.04rem;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      margin-bottom: 16px;
      color: var(--text);
    }

    .usage-tags,
    .related-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .usage-tag {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(123,168,212,0.12);
      border: 1px solid rgba(123,168,212,0.2);
      color: #d5ebff;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .audio-card {
      padding: 24px;
      background: linear-gradient(180deg, rgba(200,164,90,0.08) 0%, rgba(255,255,255,0.02) 100%);
    }

    .audio-card p {
      margin: 0 0 16px;
      color: var(--text-muted);
      line-height: 1.85;
      font-size: 0.92rem;
    }

    .audio-player {
      width: 100%;
      margin-bottom: 14px;
      filter: saturate(1.15);
    }

    .playback-rate-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .playback-rate-btn {
      padding: 8px 12px;
      font-size: 0.8rem;
      font-weight: 800;
    }

    .playback-rate-btn.active {
      border-color: rgba(200,164,90,0.45);
      background: rgba(200,164,90,0.14);
      color: var(--gold-light);
    }

    .recording-note {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.8;
    }

    .examples-card,
    .related-card {
      padding: 24px;
      margin-bottom: 18px;
    }

    .examples-card p,
    .related-card p,
    .empty-detail p {
      color: var(--text-muted);
      line-height: 1.9;
      margin: 0;
    }

    .examples-list {
      display: grid;
      gap: 12px;
    }

    .example-item {
      border: 1px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.02);
      border-radius: 16px;
      padding: 16px;
    }

    .example-item h4 {
      margin: 0 0 6px;
      color: var(--gold-light);
      font-size: 0.94rem;
      font-weight: 900;
    }

    .example-item p {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.8;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .related-link {
      display: block;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      padding: 16px;
      transition: all 0.24s var(--ease);
    }

    .related-link:hover {
      transform: translateY(-2px);
      border-color: rgba(200,164,90,0.25);
      background: rgba(255,255,255,0.05);
    }

    .related-link .name {
      color: var(--text);
      font-weight: 900;
      display: block;
      margin-bottom: 5px;
    }

    .related-link .meta {
      color: var(--text-dim);
      font-size: 0.8rem;
      display: block;
    }

    .empty-state,
    .empty-detail {
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 26px 22px;
      text-align: center;
      background: rgba(255,255,255,0.02);
    }

    .empty-state {
      margin: 6px 2px;
    }

    .empty-detail {
      padding: 54px 24px;
    }

    .empty-state svg,
    .empty-detail svg {
      margin-bottom: 14px;
      color: var(--gold);
    }

    .empty-detail h2 {
      margin: 0 0 10px;
      color: var(--text);
      font-size: 1.3rem;
      font-weight: 900;
    }

    @media (max-width: 1180px) {
      .overview-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 980px) {
      :root {
        --shell-height: auto;
      }

      .nav-breadcrumb {
        display: none;
      }

      .mobile-toggle {
        display: inline-flex;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: fixed;
        inset: 88px auto 0 0;
        width: min(92vw, 390px);
        transform: translateX(100%);
        transition: transform 0.28s var(--ease);
        z-index: 40;
        border-left: 1px solid var(--border);
        border-right: none;
        box-shadow: -16px 0 32px rgba(0,0,0,0.28);
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .main {
        padding-top: 24px;
      }

      body.sidebar-active::after {
        content: "";
        position: fixed;
        inset: 88px 0 0;
        background: rgba(0,0,0,0.48);
        z-index: 35;
      }
    }

    @media (max-width: 720px) {
      .nav-inner {
        padding: 14px 4%;
      }

      .nav-links {
        display: none;
      }

      .overview-grid {
        grid-template-columns: 1fr;
      }

      .detail-hero,
      .info-card,
      .examples-card,
      .related-card {
        padding: 20px;
      }

      .detail-heading {
        gap: 14px;
      }
    }
  </style>
</head>

  <main id="main-content">
    <div class="shell">
      <aside class="sidebar" id="rhythm-sidebar">
        <div class="sidebar-inner">
          <div class="sidebar-head">
            <span class="sidebar-kicker">إيقاع</span>
            <h1>الإيقاعات التفاعلية</h1>
            <p>تصفّح الإيقاعات العربية عبر البحث والتوقيع الزمني، ثم استمع إلى تسجيل كامل لكل إيقاع مع مساحة جاهزة لإضافة أمثلة من الأغاني والقطع لاحقاً.</p>
          </div>

          <div class="filters">
            <div class="filter-field">
              <label for="rhythm-search">بحث</label>
              <input id="rhythm-search" type="text" placeholder="ابحث عن إيقاع، اسم لاتيني، أو وصف">
            </div>

            <div class="filter-field">
              <label for="time-filter">التوقيع الزمني</label>
              <select id="time-filter">
                <option value="">كل التواقيع</option>
              </select>
            </div>

            <div class="filters-meta">
              <span class="results-count" id="results-count">0 إيقاع</span>
              <button class="filters-reset" id="filters-reset" type="button">إعادة ضبط</button>
            </div>
          </div>

          <div class="rhythm-list" id="rhythm-list"></div>
        </div>
      </aside>

      <main class="main">
        <div class="detail" id="rhythm-detail"></div>
      </main>
    </div>
  </main>

  <script src="data/rhythms.js"></script>

  <script src="assets/maqam-mega-menu.js"></script>
  <script>
    (function () {
      const sidebar = document.getElementById('rhythm-sidebar');
      const mobileToggle = document.getElementById('mobile-toggle');
      const searchInput = document.getElementById('rhythm-search');
      const timeFilter = document.getElementById('time-filter');
      const resetButton = document.getElementById('filters-reset');
      const listRoot = document.getElementById('rhythm-list');
      const detailRoot = document.getElementById('rhythm-detail');
      const resultsCount = document.getElementById('results-count');
      const breadcrumbLabel = document.getElementById('current-rhythm-label');
      const params = new URLSearchParams(window.location.search);

      if (!Array.isArray(window.rhythms)) {
        detailRoot.innerHTML = `
          <div class="empty-detail">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <h2>تعذّر تحميل بيانات الإيقاعات</h2>
            <p>تأكّد من وجود ملف البيانات وربطه بهذه الصفحة.</p>
          </div>
        `;
        return;
      }

      const normalizeText = (value) => {
        if (typeof window.normalize === 'function') return window.normalize(value || '');
        return String(value || '')
          .toLowerCase()
          .replace(/[أإآ]/g, 'ا')
          .replace(/ى/g, 'ي')
          .replace(/ة/g, 'ه')
          .replace(/[\u064B-\u065F]/g, '');
      };

      const slugifyRhythm = (value) => String(value || '')
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9\u0600-\u06FF]+/g, '-')
        .replace(/^-+|-+$/g, '');

      const enrichedRhythms = window.rhythms.map((rhythm, index) => {
        const id = rhythm.id || slugifyRhythm(rhythm.latin || rhythm.name || ('rhythm-' + index));
        const usage = Array.isArray(rhythm.usage) ? rhythm.usage : [];
        const examples = Array.isArray(rhythm.examples) ? rhythm.examples : [];
        const tempo = String(rhythm.tempo || '').trim() || 'غير محدد';
        return {
          ...rhythm,
          id,
          usage,
          examples,
          tempo
        };
      });

      const uniqueTimeSignatures = [...new Set(enrichedRhythms.map(item => item.time_signature).filter(Boolean))];

      function parseSignatureValue(signature) {
        const parts = String(signature || '').split('/').map(Number);
        if (parts.length !== 2 || parts.some(Number.isNaN)) return Number.MAX_SAFE_INTEGER;
        return parts[0] * 100 + parts[1];
      }

      uniqueTimeSignatures.sort((a, b) => parseSignatureValue(a) - parseSignatureValue(b));

      uniqueTimeSignatures.forEach(signature => {
        const option = document.createElement('option');
        option.value = signature;
        option.textContent = signature;
        timeFilter.appendChild(option);
      });

      const state = {
        selectedRhythmId: params.get('rhythm') || (enrichedRhythms[0] ? enrichedRhythms[0].id : null),
        query: params.get('q') || '',
        timeSignature: params.get('time') || '',
        playbackRate: Number(params.get('rate')) || 1
      };

      searchInput.value = state.query;
      timeFilter.value = uniqueTimeSignatures.includes(state.timeSignature) ? state.timeSignature : '';

      function getFilteredRhythms() {
        const q = normalizeText(state.query);
        return enrichedRhythms.filter((rhythm) => {
          const haystack = [
            rhythm.name,
            rhythm.latin,
            rhythm.description,
            rhythm.pattern,
            rhythm.time_signature,
            ...(rhythm.usage || [])
          ].map(normalizeText).join(' | ');

          const matchesQuery = !q || haystack.includes(q);
          const matchesTime = !state.timeSignature || rhythm.time_signature === state.timeSignature;
          return matchesQuery && matchesTime;
        });
      }

      function getSelectedRhythm(filtered) {
        const selected = filtered.find(item => item.id === state.selectedRhythmId);
        if (selected) return selected;
        return filtered[0] || null;
      }

      function syncUrl() {
        const url = new URL(window.location.href);
        if (state.selectedRhythmId) url.searchParams.set('rhythm', state.selectedRhythmId);
        else url.searchParams.delete('rhythm');

        if (state.query) url.searchParams.set('q', state.query);
        else url.searchParams.delete('q');

        if (state.timeSignature) url.searchParams.set('time', state.timeSignature);
        else url.searchParams.delete('time');

        if (state.playbackRate && state.playbackRate !== 1) url.searchParams.set('rate', String(state.playbackRate));
        else url.searchParams.delete('rate');

        window.history.replaceState({}, '', url.toString());
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        document.body.classList.remove('sidebar-active');
        mobileToggle.setAttribute('aria-expanded', 'false');
      }

      function openSidebar() {
        sidebar.classList.add('open');
        document.body.classList.add('sidebar-active');
        mobileToggle.setAttribute('aria-expanded', 'true');
      }

      mobileToggle.addEventListener('click', () => {
        if (sidebar.classList.contains('open')) closeSidebar();
        else openSidebar();
      });

      document.addEventListener('click', (event) => {
        if (window.innerWidth > 980) return;
        if (!sidebar.classList.contains('open')) return;
        if (sidebar.contains(event.target) || mobileToggle.contains(event.target)) return;
        closeSidebar();
      });

      window.addEventListener('resize', () => {
        if (window.innerWidth > 980) closeSidebar();
      });

      function createListCard(rhythm, isActive) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'rhythm-nav-card' + (isActive ? ' active' : '');
        button.innerHTML = `
          <div class="rhythm-nav-top">
            <div>
              <span class="rhythm-nav-name">${escapeHtml(rhythm.name)}</span>
              <span class="rhythm-nav-latin">${escapeHtml(rhythm.latin || '—')}</span>
            </div>
            <span class="rhythm-badge">${escapeHtml(rhythm.time_signature || '—')}</span>
          </div>
          <div class="rhythm-nav-meta">
            <span class="tempo-chip">${escapeHtml(rhythm.tempo || 'غير محدد')}</span>
          </div>
          <div class="rhythm-nav-pattern">${escapeHtml(rhythm.pattern || '—')}</div>
        `;
        button.addEventListener('click', () => {
          state.selectedRhythmId = rhythm.id;
          render();
          if (window.innerWidth <= 980) closeSidebar();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        return button;
      }

      function renderList(filtered, selected) {
        listRoot.innerHTML = '';
        resultsCount.textContent = `${filtered.length} ${filtered.length === 1 ? 'إيقاع' : 'إيقاعات'}`;

        if (!filtered.length) {
          if (typeof window.createEmptyState === 'function') {
            listRoot.appendChild(window.createEmptyState('لا توجد نتائج مطابقة لهذه الفلاتر'));
          } else {
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.innerHTML = '<p>لا توجد نتائج مطابقة لهذه الفلاتر</p>';
            listRoot.appendChild(empty);
          }
          return;
        }

        filtered.forEach((rhythm) => {
          listRoot.appendChild(createListCard(rhythm, selected && selected.id === rhythm.id));
        });
      }

      function renderExamples(rhythm) {
        if (rhythm.examples.length) {
          return `
            <div class="examples-list">
              ${rhythm.examples.map((example) => {
                if (typeof example === 'string') {
                  return `
                    <div class="example-item">
                      <h4>${escapeHtml(example)}</h4>
                      <p>يمكن لاحقاً إضافة معلومات العمل، المؤلف، والموضع الذي يظهر فيه الإيقاع.</p>
                    </div>
                  `;
                }

                return `
                  <div class="example-item">
                    <h4>${escapeHtml(example.title || 'مثال')}</h4>
                    <p>${escapeHtml(example.note || 'يمكن لاحقاً إضافة معلومات العمل، المؤلف، والموضع الذي يظهر فيه الإيقاع.')}</p>
                  </div>
                `;
              }).join('')}
            </div>
          `;
        }

        return `
          <p>هذه الخانة جاهزة لإضافة أمثلة من الأغاني والقطع التي يظهر فيها هذا الإيقاع. حالياً لا توجد أمثلة مرتبطة بهذا الإدخال بعد.</p>
        `;
      }

      function getRelatedRhythms(current) {
        return enrichedRhythms
          .filter(item => item.id !== current.id && item.time_signature === current.time_signature)
          .sort((a, b) => String(a.name || '').localeCompare(String(b.name || ''), 'ar'))
          .slice(0, 4);
      }

      function bindPlaybackRates() {
        const audio = document.getElementById('rhythm-audio');
        const buttons = Array.from(document.querySelectorAll('.playback-rate-btn'));
        if (!audio || !buttons.length) return;

        const applyRate = (rate) => {
          state.playbackRate = rate;
          audio.playbackRate = rate;
          buttons.forEach((button) => {
            button.classList.toggle('active', Number(button.dataset.rate) === rate);
          });
          syncUrl();
        };

        audio.playbackRate = state.playbackRate || 1;
        buttons.forEach((button) => {
          button.addEventListener('click', () => applyRate(Number(button.dataset.rate)));
          if (Number(button.dataset.rate) === (state.playbackRate || 1)) {
            button.classList.add('active');
          }
        });
      }

      function renderDetail(selected) {
        if (!selected) {
          breadcrumbLabel.textContent = '—';
          detailRoot.innerHTML = `
            <div class="empty-detail">
              <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
              </svg>
              <h2>لا يوجد إيقاع محدد</h2>
              <p>جرّب تغيير البحث أو الفلاتر من القائمة الجانبية.</p>
            </div>
          `;
          return;
        }

        breadcrumbLabel.textContent = selected.name;

        const usageTags = selected.usage.length
          ? selected.usage.map(tag => `<span class="usage-tag">${escapeHtml(tag)}</span>`).join('')
          : '<span class="usage-tag">سيُضاف الاستعمال لاحقاً</span>';

        const related = getRelatedRhythms(selected);

        detailRoot.innerHTML = `
          <section class="detail-card detail-hero">
            <span class="detail-kicker">iqa‘ reference</span>
            <div class="detail-heading">
              <div>
                <h1 class="detail-title">${escapeHtml(selected.name)}</h1>
                <p class="detail-subtitle">${escapeHtml(selected.latin || '—')}</p>
              </div>
              <div class="hero-meta">
                <span class="rhythm-badge">${escapeHtml(selected.time_signature || '—')}</span>
                <span class="tempo-chip">${escapeHtml(selected.tempo || 'غير محدد')}</span>
              </div>
            </div>
            <p class="detail-summary">${escapeHtml(selected.description || 'لا يوجد وصف مختصر لهذا الإيقاع بعد.')}</p>
          </section>

          <section class="overview-grid">
            <article>
              <h3>التوقيع الزمني</h3>
              <p>${escapeHtml(selected.time_signature || '—')}</p>
            </article>
            <article>
              <h3>فئة السرعة</h3>
              <p>${escapeHtml(selected.tempo || '—')}</p>
            </article>
            <article>
              <h3>النمط الأساسي</h3>
              <p>${escapeHtml(selected.pattern || '—')}</p>
            </article>
            <article>
              <h3>عدد الاستعمالات</h3>
              <p>${escapeHtml(selected.usage.length ? String(selected.usage.length) : '—')}</p>
            </article>
          </section>

          <section class="info-grid">
            <article class="info-card">
              <h2 class="section-title">المعلومات الأساسية</h2>
              <div class="pattern-box">${escapeHtml(selected.pattern || '—')}</div>
              <div class="usage-tags">${usageTags}</div>
            </article>

            <article class="info-card audio-card">
              <h2 class="section-title">التسجيل الكامل</h2>
              <p>استمع إلى دورة الإيقاع كاملة. يمكنك أيضاً تغيير سرعة التشغيل للمراجعة من البطيء إلى الأسرع بدون تغيير الملف الأصلي.</p>
              ${selected.audio ? `<audio id="rhythm-audio" class="audio-player" controls preload="none" src="${escapeHtml(selected.audio)}"></audio>` : '<div class="empty-state"><p>لا يوجد تسجيل مرتبط بهذا الإيقاع بعد.</p></div>'}
              ${selected.audio ? `
                <div class="playback-rate-group" aria-label="سرعة تشغيل التسجيل">
                  <button type="button" class="playback-rate-btn" data-rate="0.75">0.75×</button>
                  <button type="button" class="playback-rate-btn" data-rate="1">1×</button>
                  <button type="button" class="playback-rate-btn" data-rate="1.25">1.25×</button>
                </div>
                <div class="recording-note">هذه السرعات تغيّر تشغيل التسجيل نفسه للمراجعة السمعية، بينما تبقى خانة «السرعة» أعلاه وصفاً موسيقياً عاماً لطبيعة الإيقاع.</div>
              ` : ''}
            </article>
          </section>

          <section class="examples-card">
            <h2 class="section-title">أمثلة من الأغاني والقطع</h2>
            ${renderExamples(selected)}
          </section>

          <section class="related-card">
            <h2 class="section-title">إيقاعات قريبة</h2>
            ${related.length ? `
              <div class="related-grid">
                ${related.map(item => `
                  <a class="related-link" href="?rhythm=${encodeURIComponent(item.id)}">
                    <span class="name">${escapeHtml(item.name)}</span>
                    <span class="meta">${escapeHtml(item.time_signature)} · ${escapeHtml(item.tempo)}</span>
                  </a>
                `).join('')}
              </div>
            ` : '<p>لا توجد اقتراحات مرتبطة مضبوطة لهذا الإيقاع بعد.</p>'}
          </section>
        `;

        bindPlaybackRates();

        detailRoot.querySelectorAll('.related-link').forEach((link) => {
          link.addEventListener('click', (event) => {
            event.preventDefault();
            const nextId = new URL(link.href).searchParams.get('rhythm');
            if (!nextId) return;
            state.selectedRhythmId = nextId;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
        });
      }

      function render() {
        const filtered = getFilteredRhythms();
        const selected = getSelectedRhythm(filtered);
        state.selectedRhythmId = selected ? selected.id : null;
        renderList(filtered, selected);
        renderDetail(selected);
        syncUrl();
      }

      searchInput.addEventListener('input', (event) => {
        state.query = event.target.value.trim();
        render();
      });

      timeFilter.addEventListener('change', (event) => {
        state.timeSignature = event.target.value;
        render();
      });

      resetButton.addEventListener('click', () => {
        state.query = '';
        state.timeSignature = '';
        state.playbackRate = 1;
        searchInput.value = '';
        timeFilter.value = '';
        render();
      });

      render();
    })();
  </script>
</body>
</html>
