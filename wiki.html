<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الموسوعة — موسيقتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <style>
    /* ── Wiki-specific styles ────────────────── */
    .wiki-hero {
      padding: 60px 5% 48px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
    }
    .wiki-hero-tag {
      font-size: 0.72rem; letter-spacing: 0.14em; color: var(--gold);
      text-transform: uppercase; font-weight: 700; margin-bottom: 10px;
      display: block;
    }
    .wiki-hero h1 {
      font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 900;
      margin-bottom: 12px; line-height: 1.2;
    }
    .wiki-hero p {
      color: var(--text-muted); font-size: 1rem;
      max-width: 540px; line-height: 1.7;
    }
 
    /* ── Search ───────────────────────────────── */
    .wiki-search-wrap {
      padding: 28px 5% 0;
    }
    .wiki-search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 18px; max-width: 480px;
      transition: border-color 0.3s;
    }
    .wiki-search-bar:focus-within {
      border-color: rgba(200,164,90,0.45);
      box-shadow: 0 0 0 3px rgba(200,164,90,0.07);
    }
    .wiki-search-bar svg { flex-shrink: 0; color: var(--text-dim); }
    .wiki-search-bar input {
      background: none; border: none; outline: none;
      color: var(--text); font-family: inherit; font-size: 0.95rem;
      width: 100%;
    }
    .wiki-search-bar input::placeholder { color: var(--text-dim); }
 
    /* ── Section headers ─────────────────────── */
    .wiki-section {
      padding: 56px 5% 0;
    }
    .wiki-section-header {
      display: flex; align-items: baseline; gap: 14px;
      margin-bottom: 28px; padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .wiki-section-header h2 {
      font-size: 1.3rem; font-weight: 800;
    }
    .wiki-section-header span {
      font-size: 0.8rem; color: var(--text-dim);
    }
 
    /* ── Maqamat grid ────────────────────────── */
    #maqamat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding-bottom: 8px;
    }
    .maqam-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden; display: block;
      text-decoration: none; color: inherit; position: relative;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s;
    }
    .maqam-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.45);
      border-color: rgba(200,164,90,0.22);
    }
    .maqam-card-accent {
      height: 4px; border-bottom: 1px solid transparent;
    }
    .maqam-card-body { padding: 20px; }
    .maqam-name-row {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 8px;
    }
    .maqam-name { font-size: 1.2rem; font-weight: 800; }
    .maqam-latin { font-size: 0.78rem; color: var(--text-dim); font-style: italic; }
    .maqam-desc {
      font-size: 0.84rem; color: var(--text-muted);
      line-height: 1.6; margin-bottom: 12px;
    }
    .maqam-feelings { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
    .feeling-tag {
      font-size: 0.72rem; padding: 3px 10px; border-radius: 100px;
      background: var(--surface2); color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .maqam-footer {
      display: flex; justify-content: space-between; align-items: center;
    }
    .maqam-examples-count { font-size: 0.78rem; color: var(--text-dim); }
    .maqam-arrow {
      color: var(--gold); font-size: 0.9rem;
      transition: transform 0.2s;
    }
    .maqam-card:hover .maqam-arrow { transform: translateX(-4px); }
 
    /* ── History accordion ───────────────────── */
    #history-list {
      display: flex; flex-direction: column; gap: 2px;
      padding-bottom: 80px;
    }
    .history-item {
      border: 1px solid var(--border); border-radius: 12px; overflow: hidden;
    }
    .history-toggle {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between; gap: 16px;
      background: var(--bg2); padding: 20px 22px;
      border: none; cursor: pointer; text-align: start;
      color: var(--text); font-family: inherit;
      transition: background 0.2s;
    }
    .history-toggle:hover { background: var(--bg3); }
    .history-toggle[aria-expanded="true"] { background: var(--bg3); }
    .history-toggle-left { display: flex; align-items: center; gap: 16px; }
    .history-index {
      font-size: 1.4rem; font-weight: 900; color: var(--gold);
      opacity: 0.5; min-width: 32px; font-family: 'Cairo', sans-serif;
    }
    .history-titles { display: flex; flex-direction: column; gap: 2px; }
    .history-title { font-size: 1rem; font-weight: 700; }
    .history-subtitle { font-size: 0.8rem; color: var(--text-muted); }
    .history-toggle-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .history-period { font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }
    .history-chevron { color: var(--text-dim); transition: transform 0.3s ease; }
    .history-content {
      padding: 24px 22px; border-top: 1px solid var(--border);
      background: var(--bg);
    }
    .history-text {
      color: var(--text-muted); line-height: 1.85;
      font-size: 0.92rem; margin-bottom: 16px;
    }
    .history-highlights { display: flex; flex-wrap: wrap; gap: 8px; }
    .history-highlight {
      font-size: 0.78rem; padding: 5px 12px; border-radius: 100px;
      background: var(--gold-dim); border: 1px solid rgba(200,164,90,0.2);
      color: var(--gold-light);
    }
 
    @media (max-width: 600px) {
      #maqamat-grid { grid-template-columns: 1fr; }
      .history-period { display: none; }
    }
  </style>
</head>
<body>
 
  <!-- NAV -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">موسيقتي</a>
    <div class="nav-links">
      <a href="library.html">المكتبة</a>
      <a href="wiki.html" class="active">الموسوعة</a>
      <a href="index.html#about">عن المشروع</a>
    </div>
  </nav>
 
  <!-- HERO -->
  <header class="wiki-hero">
    <span class="wiki-hero-tag">موسوعة</span>
    <h1>الموسيقى العربية</h1>
    <p>مرجع شامل للمقامات والتاريخ الموسيقي العربي — من العصر العباسي حتى اليوم.</p>
  </header>
 
  <!-- SEARCH -->
  <div class="wiki-search-wrap">
    <div class="wiki-search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="wiki-search" type="text" placeholder="ابحث عن مقام، طابع، اسم...">
    </div>
  </div>
 
  <!-- MAQAMAT SECTION -->
  <section class="wiki-section">
    <div class="wiki-section-header">
      <h2>المقامات الموسيقية</h2>
      <span id="maqam-count"></span>
    </div>
    <div id="maqamat-grid"></div>
  </section>
 
  <!-- HISTORY SECTION -->
  <section class="wiki-section" style="padding-top:56px">
    <div class="wiki-section-header">
      <h2>تاريخ الموسيقى العربية</h2>
      <span>من جذورها حتى اليوم</span>
    </div>
    <div id="history-list"></div>
  </section>
 
  <!-- SCRIPTS -->
  <script src="data/maqamat.js"></script>
  <script src="data/history.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/wiki.js"></script>
  <script>
    // update maqam count after render
    document.getElementById('maqam-count').textContent = maqamat.length + ' مقامات';
  </script>
</body>
</html>
