          <a href="index-en.html" class="nav-logo">Musicatea</a>
        </div>
        <div class="nav-top-left">
          <a href="library.html" class="lang-toggle" aria-label="Switch to Arabic">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>

  <header class="page-hero">
    <h1>Sheet Music Library</h1>
    <p>Arabic and Western sheet music — filterable and free to download.</p>
  </header>

  <div class="filters">
    <select id="system">
      <option>Eastern Notation</option>
      <option>Western Notation</option>
    </select>

    <select id="type">
      <option>All</option>
      <option>Song</option>
      <option>Instrumental</option>
    </select>

    <select id="maqam">
      <option value="">All Maqamat</option>
    </select>

    <select id="scale" style="display:none;">
      <option value="">All Scales</option>
    </select>

    <select id="tonic">
      <option value="">Tonic</option>
    </select>

    <input id="search" type="text" placeholder="Search by name or composer...">
  </div>

  <div id="list" class="grid"></div>

  <footer class="site-footer">
    <span class="footer-logo">Musicatea</span>
    <span>© 2025 Musicatea</span>
  </footer>

  <script src="data/sheets.js"></script>
