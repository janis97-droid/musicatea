<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="250" viewBox="0 0 1100 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .beam { fill:#111; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <line class="staff" x1="40" y1="120" x2="1060" y2="120"/>

  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 2/4 -->
  <text class="timesig" x="128" y="113">2</text>
  <text class="timesig" x="128" y="172">4</text>

  <!-- 1/16 DOM -->
  <ellipse class="notehead" cx="255" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="270" y1="120" x2="270" y2="36"/>
  <!-- single flag only, no beam to TAK -->
  <polygon class="beam" points="270,36 270,44 308,58 308,50"/>
  <polygon class="beam" points="270,53 270,61 304,74 304,66"/>

  <!-- three 1/16 TAK -->
  <ellipse class="notehead" cx="390" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="375" y1="117" x2="375" y2="201"/>

  <ellipse class="notehead" cx="490" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="475" y1="117" x2="475" y2="201"/>

  <ellipse class="notehead" cx="590" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="575" y1="117" x2="575" y2="201"/>

  <!-- beams only between TAK notes -->
  <polygon class="beam" points="375,201 575,201 575,193 375,193"/>
  <polygon class="beam" points="375,184 575,184 575,176 375,176"/>

  <!-- 1/8 DOM -->
  <ellipse class="notehead" cx="785" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="800" y1="120" x2="800" y2="36"/>
  <!-- single flag only, no beam to TAK -->
  <polygon class="beam" points="800,36 800,44 838,58 838,50"/>

  <!-- 1/8 TAK -->
  <ellipse class="notehead" cx="925" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="910" y1="117" x2="910" y2="201"/>
  <!-- single flag only -->
  <polygon class="beam" points="910,201 950,187 950,179 910,193"/>

  <line class="barthin" x1="1015" y1="45" x2="1015" y2="195"/>
</svg>
