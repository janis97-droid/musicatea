<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="240" viewBox="0 0 1200 240">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .flag { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
      .rest { font-size: 128px; fill:#111; font-family: "Bravura", "Noto Music", "Segoe UI Symbol", serif; text-anchor:middle; dominant-baseline:middle; }
      .dot { fill:#111; }
      .divider { stroke:#111; stroke-width:4; stroke-dasharray:14 14; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <line class="staff" x1="40" y1="120" x2="1160" y2="120"/>

  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <text class="timesig" x="128" y="113">4</text>
  <text class="timesig" x="128" y="172">4</text>

  <!-- دم (dotted) -->
  <ellipse class="notehead" cx="220" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="235" y1="120" x2="235" y2="36"/>
  <path class="flag" d="M235 36 C249 38, 263 47, 272 64" />
  <circle class="dot" cx="264" cy="107" r="5"/>

  <!-- تك (dotted) -->
  <ellipse class="notehead" cx="390" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="375" y1="117" x2="375" y2="201"/>
  <path class="flag" d="M375 201 C389 197, 404 188, 415 171" />
  <circle class="dot" cx="434" cy="107" r="5"/>

  <!-- تك -->
  <ellipse class="notehead" cx="560" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="545" y1="117" x2="545" y2="201"/>
  <path class="flag" d="M545 201 C559 197, 574 188, 585 171" />

  <!-- visual divider like the reference image -->
  <line class="divider" x1="700" y1="28" x2="700" y2="212"/>

  <!-- دم -->
  <ellipse class="notehead" cx="790" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="805" y1="120" x2="805" y2="36"/>
  <path class="flag" d="M805 36 C819 38, 833 47, 842 64" />

  <!-- rest -->
  <text class="rest" x="900" y="115">𝄾</text>

  <!-- تك -->
  <ellipse class="notehead" cx="1000" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="985" y1="117" x2="985" y2="201"/>
  <path class="flag" d="M985 201 C999 197, 1014 188, 1025 171" />

  <!-- rest -->
  <text class="rest" x="1105" y="115">𝄾</text>

  <line class="barthin" x1="1148" y1="45" x2="1148" y2="195"/>
</svg>
