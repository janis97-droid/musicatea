<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="250" viewBox="0 0 980 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .flag { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <!-- single middle staff line -->
  <line class="staff" x1="40" y1="120" x2="940" y2="120"/>

  <!-- opening barline -->
  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 2/4 time signature -->
  <text class="timesig" x="128" y="113">2</text>
  <text class="timesig" x="128" y="172">4</text>

  <!-- DOM = quarter note, stem up on right -->
  <ellipse class="notehead" cx="255" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="270" y1="120" x2="270" y2="36"/>

  <!-- DOM = eighth note, stem up on right -->
  <ellipse class="notehead" cx="500" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="515" y1="120" x2="515" y2="36"/>
  <path class="flag" d="M515 36 C529 38, 543 47, 552 64" />

  <!-- TAK = eighth note, mirrored down on left with flag to the right -->
  <ellipse class="notehead" cx="665" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="650" y1="117" x2="650" y2="201"/>
  <path class="flag" d="M650 201 C664 197, 679 188, 690 171" />

  <!-- final barline -->
  <line class="barthin" x1="860" y1="45" x2="860" y2="195"/>
</svg>
