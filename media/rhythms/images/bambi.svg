  <line class="stem" x1="1245" y1="117" x2="1245" y2="201"/>

  <ellipse class="notehead" cx="1340" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1325" y1="117" x2="1325" y2="201"/>

  <ellipse class="notehead" cx="1420" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1405" y1="117" x2="1405" y2="201"/>

  <ellipse class="notehead" cx="1500" cy="120" rx="16" ry="11"/>
