  <!-- 1/16 rest -->
  <text class="rest16" x="700" y="115">𝄿</text>

  <!-- 1/16 TAK -->
  <ellipse class="notehead" cx="820" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="805" y1="117" x2="805" y2="201"/>
