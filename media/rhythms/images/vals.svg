<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="980" height="250" viewBox="0 0 980 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <line class="staff" x1="40" y1="120" x2="940" y2="120"/>

  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 3/4 -->
  <text class="timesig" x="128" y="113">3</text>
  <text class="timesig" x="128" y="172">4</text>

  <!-- 1/4 DOM -->
  <ellipse class="notehead" cx="250" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="265" y1="120" x2="265" y2="36"/>

  <!-- 1/4 TAK -->
  <ellipse class="notehead" cx="500" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="485" y1="117" x2="485" y2="201"/>

  <!-- 1/4 TAK -->
  <ellipse class="notehead" cx="700" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="685" y1="117" x2="685" y2="201"/>

  <line class="barthin" x1="850" y1="45" x2="850" y2="195"/>
</svg>
