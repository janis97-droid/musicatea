      .rest16 { font-size:104px; fill:#111; font-family:"Bravura","Noto Music","Segoe UI Symbol",serif; text-anchor:middle; dominant-baseline:middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

