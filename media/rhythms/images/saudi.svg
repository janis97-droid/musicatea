<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="250" viewBox="0 0 1200 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .beam { fill:#111; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
      .rest8 { font-size:118px; fill:#111; font-family:"Bravura","Noto Music","Segoe UI Symbol",serif; text-anchor:middle; dominant-baseline:middle; }
      .rest16 { font-size:104px; fill:#111; font-family:"Bravura","Noto Music","Segoe UI Symbol",serif; text-anchor:middle; dominant-baseline:middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <line class="staff" x1="40" y1="120" x2="1160" y2="120"/>

  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 2/4 -->
  <text class="timesig" x="128" y="113">2</text>
  <text class="timesig" x="128" y="172">4</text>

  <!-- 1/16 DOM -->
  <ellipse class="notehead" cx="245" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="260" y1="120" x2="260" y2="36"/>
  <polygon class="beam" points="260,36 260,44 298,58 298,50"/>
  <polygon class="beam" points="260,53 260,61 294,74 294,66"/>

  <!-- 1/16 rest -->
  <text class="rest16" x="380" y="115">𝄿</text>

  <!-- 1/16 DOM -->
  <ellipse class="notehead" cx="515" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="530" y1="120" x2="530" y2="36"/>
  <polygon class="beam" points="530,36 530,44 568,58 568,50"/>
  <polygon class="beam" points="530,53 530,61 564,74 564,66"/>

  <!-- 1/8 rest -->
  <text class="rest8" x="705" y="115">𝄾</text>

  <!-- two 1/16 TAK -->
  <ellipse class="notehead" cx="900" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="885" y1="117" x2="885" y2="201"/>

  <ellipse class="notehead" cx="1005" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="990" y1="117" x2="990" y2="201"/>

  <polygon class="beam" points="885,201 990,201 990,193 885,193"/>
  <polygon class="beam" points="885,184 990,184 990,176 885,176"/>

  <line class="barthin" x1="1095" y1="45" x2="1095" y2="195"/>
</svg>
