<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="250" viewBox="0 0 1500 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .beam { fill:#111; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <line class="staff" x1="40" y1="120" x2="1460" y2="120"/>

  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 8/8 -->
  <text class="timesig" x="128" y="113">8</text>
  <text class="timesig" x="128" y="172">8</text>

  <!-- 1/8 DOM -->
  <ellipse class="notehead" cx="245" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="260" y1="120" x2="260" y2="36"/>
  <polygon class="beam" points="260,36 260,44 298,58 298,50"/>

  <!-- two 1/16 TAK - beamed pair -->
  <ellipse class="notehead" cx="395" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="380" y1="117" x2="380" y2="201"/>
  <ellipse class="notehead" cx="500" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="485" y1="117" x2="485" y2="201"/>
  <polygon class="beam" points="380,201 485,201 485,193 380,193"/>
  <polygon class="beam" points="380,184 485,184 485,176 380,176"/>

  <!-- two 1/8 TAK - beamed pair -->
  <ellipse class="notehead" cx="650" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="635" y1="117" x2="635" y2="201"/>
  <ellipse class="notehead" cx="790" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="775" y1="117" x2="775" y2="201"/>
  <polygon class="beam" points="635,201 775,201 775,193 635,193"/>

  <!-- 1/8 DOM -->
  <ellipse class="notehead" cx="950" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="965" y1="120" x2="965" y2="36"/>
  <polygon class="beam" points="965,36 965,44 1003,58 1003,50"/>

  <!-- 1/8 TAK -->
  <ellipse class="notehead" cx="1095" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1080" y1="117" x2="1080" y2="201"/>
  <polygon class="beam" points="1080,201 1120,187 1120,179 1080,193"/>

  <!-- 1/4 TAK -->
  <ellipse class="notehead" cx="1260" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1245" y1="117" x2="1245" y2="201"/>

  <line class="barthin" x1="1405" y1="45" x2="1405" y2="195"/>
</svg>
