      .dot{fill:#111}.beam{fill:#111}.timesig{font-size:78px;fill:#111;font-family:Georgia,'Times New Roman',serif;font-weight:700}
    </style>
  </defs>
  <rect width="100%" height="100%" fill="white"/>
  <line class="staff" x1="40" y1="120" x2="1160" y2="120"/>
