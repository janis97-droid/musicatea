<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="250" viewBox="0 0 1400 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .beam { fill:#111; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
      .rest16 { font-size:104px; fill:#111; font-family: "Bravura", "Noto Music", "Segoe UI Symbol", serif; text-anchor:middle; dominant-baseline:middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>
  <line class="staff" x1="40" y1="120" x2="1360" y2="120"/>

  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 4/4 -->
  <text class="timesig" x="128" y="113">4</text>
  <text class="timesig" x="128" y="172">4</text>

  <!-- 1/8 DOM -->
  <ellipse class="notehead" cx="240" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="255" y1="120" x2="255" y2="36"/>
  <polygon class="beam" points="255,36 255,44 293,58 293,50"/>

  <!-- 1/16 rest -->
  <text class="rest16" x="370" y="115">𝄿</text>

  <!-- 1/16 TAK -->
  <ellipse class="notehead" cx="490" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="475" y1="117" x2="475" y2="201"/>
  <polygon class="beam" points="475,201 515,187 515,179 475,193"/>
  <polygon class="beam" points="475,184 509,171 509,163 475,176"/>

  <!-- 1/8 TAK -->
  <ellipse class="notehead" cx="620" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="605" y1="117" x2="605" y2="201"/>
  <polygon class="beam" points="605,201 645,187 645,179 605,193"/>

  <!-- two 1/8 DOM connected -->
  <ellipse class="notehead" cx="790" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="805" y1="120" x2="805" y2="36"/>

  <ellipse class="notehead" cx="930" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="945" y1="120" x2="945" y2="36"/>

  <polygon class="beam" points="805,36 945,36 945,44 805,44"/>

  <!-- 1/4 TAK -->
  <ellipse class="notehead" cx="1120" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1105" y1="117" x2="1105" y2="201"/>

  <line class="barthin" x1="1260" y1="45" x2="1260" y2="195"/>
</svg>
