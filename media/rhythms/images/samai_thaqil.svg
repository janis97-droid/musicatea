<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="250" viewBox="0 0 1900 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .flag { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
      .rest8 { font-size:118px; fill:#111; font-family: "Bravura", "Noto Music", "Segoe UI Symbol", serif; text-anchor:middle; dominant-baseline:middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <!-- single middle staff line -->
  <line class="staff" x1="40" y1="120" x2="1860" y2="120"/>

  <!-- opening barline -->
  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 10/8 time signature -->
  <text class="timesig" x="128" y="113">10</text>
  <text class="timesig" x="128" y="172">8</text>

  <!-- 1: DOM -->
  <ellipse class="notehead" cx="280" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="295" y1="120" x2="295" y2="36"/>
  <path class="flag" d="M295 36 C309 38, 323 47, 332 64" />

  <!-- 2: rest -->
  <text class="rest8" x="430" y="115">𝄾</text>

  <!-- 3: rest -->
  <text class="rest8" x="560" y="115">𝄾</text>

  <!-- 4: TAK -->
  <ellipse class="notehead" cx="705" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="690" y1="117" x2="690" y2="201"/>
  <path class="flag" d="M690 201 C704 197, 719 188, 730 171" />

  <!-- 5: rest -->
  <text class="rest8" x="850" y="115">𝄾</text>

  <!-- 6: DOM -->
  <ellipse class="notehead" cx="995" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1010" y1="120" x2="1010" y2="36"/>
  <path class="flag" d="M1010 36 C1024 38, 1038 47, 1047 64" />

  <!-- 7: DOM -->
  <ellipse class="notehead" cx="1145" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1160" y1="120" x2="1160" y2="36"/>
  <path class="flag" d="M1160 36 C1174 38, 1188 47, 1197 64" />

  <!-- 8: TAK -->
  <ellipse class="notehead" cx="1310" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="1295" y1="117" x2="1295" y2="201"/>
  <path class="flag" d="M1295 201 C1309 197, 1324 188, 1335 171" />

  <!-- 9: rest -->
  <text class="rest8" x="1455" y="115">𝄾</text>

  <!-- 10: rest -->
  <text class="rest8" x="1585" y="115">𝄾</text>

  <!-- final barline -->
  <line class="barthin" x1="1735" y1="45" x2="1735" y2="195"/>
</svg>
