<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1250" height="250" viewBox="0 0 1250 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
