<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="250" viewBox="0 0 1220 250">
  <defs>
    <style>
      .staff { stroke:#111; stroke-width:3; }
      .barthin { stroke:#111; stroke-width:3; }
      .barthick { stroke:#111; stroke-width:8; }
      .notehead { fill:#111; }
      .stem { stroke:#111; stroke-width:4; }
      .flag { fill:none; stroke:#111; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }
      .timesig { font-size:78px; fill:#111; font-family: Georgia, "Times New Roman", serif; font-weight:700; }
      .rest { font-size:118px; fill:#111; font-family: "Bravura", "Noto Music", "Segoe UI Symbol", serif; text-anchor:middle; dominant-baseline:middle; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="white"/>

  <!-- single middle staff line -->
  <line class="staff" x1="40" y1="120" x2="1180" y2="120"/>

  <!-- opening barline -->
  <line class="barthick" x1="68" y1="45" x2="68" y2="195"/>
  <line class="barthin" x1="84" y1="45" x2="84" y2="195"/>

  <!-- 4/4 time signature -->
  <text class="timesig" x="128" y="113">4</text>
  <text class="timesig" x="128" y="172">4</text>

  <!-- DOM = 1/8 -->
  <ellipse class="notehead" cx="250" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="265" y1="120" x2="265" y2="36"/>
  <path class="flag" d="M265 36 C279 38, 293 47, 302 64" />

  <!-- TAK = 1/4 -->
  <ellipse class="notehead" cx="400" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="385" y1="117" x2="385" y2="201"/>

  <!-- DOM = 1/8 -->
  <ellipse class="notehead" cx="600" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="615" y1="120" x2="615" y2="36"/>
  <path class="flag" d="M615 36 C629 38, 643 47, 652 64" />

  <!-- DOM = 1/4 -->
  <ellipse class="notehead" cx="770" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="785" y1="120" x2="785" y2="36"/>

  <!-- TAK = 1/4 -->
  <ellipse class="notehead" cx="945" cy="120" rx="16" ry="11"/>
  <line class="stem" x1="930" y1="117" x2="930" y2="201"/>

<!-- final barline -->
  <line class="barthin" x1="1150" y1="45" x2="1150" y2="195"/>
</svg>
